<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIJO PAY - Recharger mon compte</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #000000;
            --accent-color: #ffcc00; /* Or MIJO */
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --error-color: #e74c3c;
            --success-color: #2ecc71;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .logo {
            font-size: 2rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .logo span {
            color: var(--accent-color);
        }

        .user-status {
            font-size: 0.9rem;
            background: #eee;
            padding: 8px 15px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 30px;
        }

        .user-name {
            font-weight: 600;
            color: var(--primary-color);
        }

        h2 {
            margin-bottom: 10px;
            font-weight: 600;
        }

        p.subtitle {
            font-size: 0.85rem;
            color: #777;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            box-sizing: border-box;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            outline: none;
            box-shadow: 0 0 8px rgba(255, 204, 0, 0.2);
        }

        .btn-recharge {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-recharge:hover {
            background-color: #222;
        }

        .btn-recharge:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }

        .error { background-color: #f8d7da; color: var(--error-color); border: 1px solid #f5c6cb; }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid #fff;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: none;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #aaa;
        }

        /* =========================================
           ANIMATION FINTECH (Grand V de succès)
           ========================================= */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .success-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .success-circle {
            width: 120px;
            height: 120px;
            background-color: var(--success-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3);
            transform: scale(0);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .success-overlay.active .success-circle {
            transform: scale(1);
        }

        .success-circle i {
            color: white;
            font-size: 60px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease 0.3s; /* Délai pour apparaître après le cercle */
        }

        .success-overlay.active .success-circle i {
            opacity: 1;
            transform: translateY(0);
        }

        .success-text {
            margin-top: 30px;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary-color);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.4s ease 0.4s;
        }

        .success-amount {
            font-size: 1.2rem;
            color: #666;
            margin-top: 10px;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.4s ease 0.5s;
        }

        .success-overlay.active .success-text,
        .success-overlay.active .success-amount {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div id="successOverlay" class="success-overlay">
    <div class="success-circle">
        <i class="fa-solid fa-check"></i>
    </div>
    <div class="success-text">Recharge Réussie !</div>
    <div class="success-amount" id="successAmountDisplay">Nouveau solde : 0 HTG</div>
</div>

<div class="container">
    <div class="card">
        <div class="logo">MIJO<span>PAY</span></div>
        
        <div id="statusContainer" class="user-status">
            <i class="fa-solid fa-circle-user"></i> Connecté : <span id="userNameDisplay" class="user-name">Utilisateur</span>
        </div>

        <h2>Recharger mon compte</h2>
        <p class="subtitle">Saisissez ou scannez le code de votre carte.</p>

        <form id="rechargeForm">
            <div class="input-group">
                <i class="fa-solid fa-qrcode"></i>
                <input type="text" id="cardCode" placeholder="MJ75-XXXX-XXXX" maxlength="19" required>
            </div>

            <button type="submit" id="submitBtn" class="btn-recharge">
                <span class="loader" id="loader"></span>
                <span id="btnText">Valider la recharge</span>
            </button>
        </form>

        <div id="message"></div>

        <footer>
            &copy; 2026 MIJO PAY - Sécurisé par Cloudflare
        </footer>
    </div>
</div>

<script>
    // ==========================================
    // 1. TENTATIVE DE RÉCUPÉRATION DE LA SESSION
    // ==========================================
    let userString = localStorage.getItem('user');
    let user = null;
    
    // On essaie de parser, mais sans bloquer la page
    try {
        if (userString && userString !== "undefined") {
            user = JSON.parse(userString);
        }
    } catch (e) {
        console.error("Erreur de lecture du stockage");
    }

    // Affichage du nom (ou repli si vide)
    const userNameDisplay = document.getElementById('userNameDisplay');
    if (user) {
        userNameDisplay.textContent = user.NomUtilisateur || user["Nom Utilisateur"] || user.nom || "Utilisateur";
    } else {
        userNameDisplay.textContent = "Non connecté";
        userNameDisplay.style.color = "#e74c3c"; // Un petit rouge pour signaler l'état
    }

    // ==========================================
    // 2. LECTURE DU SCANNER (URL)
    // ==========================================
    const urlParams = new URLSearchParams(window.location.search);
    const codeFromScanner = urlParams.get('code');
    const inputField = document.getElementById('cardCode');

    if (codeFromScanner) {
        inputField.value = codeFromScanner;
        setTimeout(() => {
            inputField.dispatchEvent(new Event('input'));
        }, 100);
    }

    // ==========================================
    // 3. LOGIQUE DE RECHARGE (AVEC VÉRIFICATION)
    // ==========================================
    const form = document.getElementById('rechargeForm');
    const messageDiv = document.getElementById('message');
    const loader = document.getElementById('loader');
    const btnText = document.getElementById('btnText');
    const submitBtn = document.getElementById('submitBtn');
    const successOverlay = document.getElementById('successOverlay');
    const successAmountDisplay = document.getElementById('successAmountDisplay');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        messageDiv.style.display = 'none';

        // --- LA VÉRIFICATION CRITIQUE ---
        if (!user || !user.userId) {
            messageDiv.className = 'error';
            messageDiv.innerHTML = `<i class="fa-solid fa-lock"></i> Erreur : Vous devez être connecté pour recharger. <a href="index.html" style="color: inherit; font-weight: bold;">Se connecter ici</a>`;
            messageDiv.style.display = 'block';
            return; // On arrête tout ici !
        }

        const code = inputField.value.trim().replace(/-/g, '');
        loader.style.display = 'inline-block';
        btnText.textContent = "Vérification...";
        submitBtn.disabled = true;

        try {
            const response = await fetch('https://grate.mijocomplexe.workers.dev/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    code: code,
                    userId: user.userId 
                })
            });

            const result = await response.json();

            if (result.status === 'success') {
                // Mise à jour du solde local
                user.Solde = result.nouveauSolde;
                localStorage.setItem('user', JSON.stringify(user));

                // Animation Succès
                successAmountDisplay.innerHTML = `Nouveau solde : <b>${result.nouveauSolde} HTG</b>`;
                successOverlay.classList.add('active');

                form.reset();
                setTimeout(() => {
                    successOverlay.classList.remove('active');
                }, 3500);

            } else {
                messageDiv.className = 'error';
                messageDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${result.message}`;
                messageDiv.style.display = 'block';
            }
        } catch (error) {
            messageDiv.className = 'error';
            messageDiv.textContent = "Erreur de connexion avec le serveur MIJO.";
            messageDiv.style.display = 'block';
        } finally {
            loader.style.display = 'none';
            btnText.textContent = "Valider la recharge";
            submitBtn.disabled = false;
        }
    });

    // Formatage auto
    inputField.addEventListener('input', function (e) {
        let value = e.target.value.replace(/[^A-Z0-9]/gi, '').toUpperCase();
        let formatted = "";
        for(let i = 0; i < value.length; i++) {
            if(i > 0 && i % 4 === 0) formatted += "-";
            formatted += value[i];
        }
        e.target.value = formatted;
    });
</script>

</body>
</html>
