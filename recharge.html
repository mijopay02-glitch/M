<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIJO PAY - Recharger mon compte</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #000000;
            --accent-color: #ffcc00; /* Or MIJO */
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --error-color: #e74c3c;
            --success-color: #2ecc71;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .logo span {
            color: var(--accent-color);
        }

        .user-status {
            font-size: 0.9rem;
            background: #eee;
            padding: 8px 15px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 30px;
        }

        .user-name {
            font-weight: 600;
            color: var(--primary-color);
        }

        h2 {
            margin-bottom: 10px;
            font-weight: 600;
        }

        p.subtitle {
            font-size: 0.85rem;
            color: #777;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            outline: none;
            box-shadow: 0 0 8px rgba(255, 204, 0, 0.2);
        }

        .btn-recharge {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-recharge:hover {
            background-color: #222;
        }

        .btn-recharge:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }

        .success { background-color: #d4edda; color: var(--success-color); border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: var(--error-color); border: 1px solid #f5c6cb; }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid #fff;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: none;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="logo">MIJO<span>PAY</span></div>
        
        <div id="statusContainer" class="user-status">
            <i class="fa-solid fa-circle-user"></i> Connecté en tant que : <span id="userNameDisplay" class="user-name">Utilisateur</span>
        </div>

        <h2>Recharger mon compte</h2>
        <p class="subtitle">Saisissez le code secret de votre carte à gratter.</p>

        <form id="rechargeForm">
            <div class="input-group">
                <i class="fa-solid fa-key"></i>
                <input type="text" id="cardCode" placeholder="XXXX-XXXX-XXXX" maxlength="14" required>
            </div>

            <button type="submit" id="submitBtn" class="btn-recharge">
                <span class="loader" id="loader"></span>
                <span id="btnText">Valider la recharge</span>
            </button>
        </form>

        <div id="message"></div>

        <footer>
            &copy; 2026 MIJO PAY - Sécurisé par Cloudflare
        </footer>
    </div>
</div>

<script>
    // ==========================================
    // 1. RÉCUPÉRATION DE LA SESSION (Format MIJO)
    // ==========================================
    const userString = localStorage.getItem('user');
    
    // Si pas de session, redirection immédiate
    if (!userString || userString === "undefined") {
        alert("Session expirée. Veuillez vous reconnecter.");
        window.location.href = "index.html"; 
    }

    const user = JSON.parse(userString);
    
    // Extraction des données selon tes noms de champs réels
    const userName = user.NomUtilisateur || user["Nom Utilisateur"] || user.nom || "Utilisateur";
    const userCardNumber = user.NumeroCarte; // Utilisation directe du NumeroCarte de l'objet user

    // Affichage du nom en haut de la page
    document.getElementById('userNameDisplay').textContent = userName;

    // ==========================================
    // 2. LOGIQUE DE RECHARGE
    // ==========================================
    const form = document.getElementById('rechargeForm');
    const messageDiv = document.getElementById('message');
    const loader = document.getElementById('loader');
    const btnText = document.getElementById('btnText');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const code = document.getElementById('cardCode').value.trim();

        messageDiv.style.display = 'none';
        loader.style.display = 'inline-block';
        btnText.textContent = "Vérification...";
        submitBtn.disabled = true;

        try {
            const response = await fetch('https://grate.mijocomplexe.workers.dev/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    code: code,
                    userCardNumber: userCardNumber // Envoi du NumeroCarte correct
                })
            });

            const result = await response.json();

            if (result.status === 'success') {
                messageDiv.className = 'success';
                messageDiv.innerHTML = `<i class="fa-solid fa-check-circle"></i> ${result.message}<br>Nouveau solde : <b>${result.nouveauSolde} HTG</b>`;
                messageDiv.style.display = 'block';

                // --- MISE À JOUR SYNCHRONISÉE DU LOCALSTORAGE ---
                // On met à jour le champ 'Solde' à l'intérieur de l'objet 'user'
                user.Solde = result.nouveauSolde;
                localStorage.setItem('user', JSON.stringify(user));

                form.reset();
            } else {
                messageDiv.className = 'error';
                messageDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${result.message}`;
                messageDiv.style.display = 'block';
            }
        } catch (error) {
            messageDiv.className = 'error';
            messageDiv.textContent = "Erreur de connexion avec le serveur.";
            messageDiv.style.display = 'block';
        } finally {
            loader.style.display = 'none';
            btnText.textContent = "Valider la recharge";
            submitBtn.disabled = false;
        }
    });

    // Formatage auto XXXX-XXXX-XXXX
    document.getElementById('cardCode').addEventListener('input', function (e) {
        let value = e.target.value.replace(/[^A-Z0-9]/gi, '').toUpperCase();
        let formatted = "";
        for(let i=0; i<value.length; i++) {
            if(i > 0 && i % 4 === 0) formatted += "-";
            formatted += value[i];
        }
        e.target.value = formatted.substring(0, 14);
    });
</script>

</body>
</html>
