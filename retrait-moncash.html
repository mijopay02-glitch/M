<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrait MonCash | MIJO PAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <!-- Formulaire Principal -->
    <div id="payment-form-container" class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full border border-gray-100">
        <div class="flex items-center justify-center gap-2 mb-6">
            <span class="text-2xl font-black tracking-wider text-gray-900">MIJO<span class="text-red-600">PAY</span></span>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 text-center mb-2">Retrait MonCash</h1>
        <p class="text-gray-500 text-sm text-center mb-8">
            Indiquez le numéro MonCash et le montant à retirer de votre solde MIJO PAY.
        </p>

        <form id="payoutForm" class="space-y-5">
            <div>
                <label for="phoneInput" class="block text-sm font-semibold text-gray-700 mb-2">Numéro MonCash</label>
                <input id="phoneInput" type="tel" placeholder="Ex: 34567890"
                    class="w-full p-4 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-red-500 text-lg font-medium tracking-wide" required/>
                <p class="text-xs text-gray-400 mt-1">8 chiffres sans le +509</p>
            </div>

            <div>
                <label for="amountInput" class="block text-sm font-semibold text-gray-700 mb-2">Montant à retirer (HTG)</label>
                <div class="relative">
                    <input id="amountInput" type="number" placeholder="Ex: 500"
                        class="w-full p-4 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-red-500 text-lg font-medium"
                        min="100" required oninput="calculerFrais()"/>
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                        <span class="text-gray-500 font-bold text-sm">HTG</span>
                    </div>
                </div>
                <p class="text-xs text-gray-400 mt-1">Minimum : 100 HTG</p>
            </div>

            <!-- Calculateur -->
            <div id="frais-box" class="hidden bg-gray-50 border border-gray-200 rounded-xl p-4 space-y-2 text-sm">
                <div class="flex justify-between text-gray-600">
                    <span>Montant du retrait</span>
                    <span id="frais-montant" class="font-semibold text-gray-800">—</span>
                </div>
                <div class="flex justify-between text-gray-500">
                    <span>Frais (10%)</span>
                    <span id="frais-val" class="text-red-500">—</span>
                </div>
                <div class="border-t border-gray-200 pt-2 flex justify-between font-bold text-gray-800">
                    <span>Total débité</span>
                    <span id="frais-total" class="text-red-600">—</span>
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-[#cc0000] hover:bg-[#a30000] text-white font-bold py-4 px-4 rounded-xl shadow-lg transition-all duration-300 flex items-center justify-center gap-2 cursor-pointer">
                <span id="submitBtnText">Confirmer le retrait</span>
            </button>
        </form>

        <div id="statusMessage" class="text-center text-sm font-semibold text-red-600 mt-4 min-h-5"></div>
    </div>

    <!-- Écran traitement -->
    <div id="redirecting-message" class="hidden bg-white rounded-2xl shadow-xl p-8 max-w-md w-full text-center border border-gray-100">
        <div class="flex justify-center mb-6">
            <svg class="animate-spin h-12 w-12 text-[#cc0000]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Retrait en cours...</h1>
        <p class="text-gray-500 text-sm">Communication avec MonCash. Veuillez patienter.</p>
    </div>

    <script>
        const WORKER_RETRAIT_URL = 'https://retrait-moncash.mijocomplexe.workers.dev';
        const FRAIS_TOTAL_RATE   = 0.10;

        function calculerFrais() {
            const montant  = parseFloat(document.getElementById('amountInput').value);
            const fraisBox = document.getElementById('frais-box');
            if (!montant || montant < 1) { fraisBox.classList.add('hidden'); return; }

            const frais = parseFloat((montant * FRAIS_TOTAL_RATE).toFixed(2));
            const total = parseFloat((montant + frais).toFixed(2));

            document.getElementById('frais-montant').textContent = montant.toLocaleString('fr') + ' G';
            document.getElementById('frais-val').textContent     = '−' + frais.toLocaleString('fr') + ' G';
            document.getElementById('frais-total').textContent   = total.toLocaleString('fr') + ' G';
            fraisBox.classList.remove('hidden');
        }

        document.getElementById('payoutForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const montant = parseFloat(document.getElementById('amountInput').value);
            const phone   = document.getElementById('phoneInput').value.trim();
            const statusEl = document.getElementById('statusMessage');

            if (isNaN(montant) || montant < 100) {
                statusEl.textContent = 'Le montant minimum est de 100 HTG.';
                return;
            }

            statusEl.textContent = '';
            document.getElementById('payment-form-container').classList.add('hidden');
            document.getElementById('redirecting-message').classList.remove('hidden');

            try {
                const userRaw = localStorage.getItem('user');
                if (!userRaw) throw new Error('Utilisateur non identifié. Veuillez vous connecter.');
                const user = JSON.parse(userRaw);
                if (!user?.userId) throw new Error('Session expirée. Reconnectez-vous.');

                const response = await fetch(WORKER_RETRAIT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: user.userId, amount: montant, phone })
                });
                const data = await response.json();

                if (response.ok && data.success) {
                    // Mettre à jour le solde local (débit déjà fait côté serveur)
                    if (data.newSolde !== undefined) {
                        user.Solde = data.newSolde;
                        localStorage.setItem('user', JSON.stringify(user));
                    }
                    // Retour home — le Supabase Realtime sur home.html
                    // mettra à jour le solde automatiquement quand le webhook confirme
                    window.location.href = 'home.html?retrait=encours';
                } else {
                    throw new Error(data.error || 'Impossible de valider le retrait.');
                }

            } catch (err) {
                document.getElementById('redirecting-message').classList.add('hidden');
                document.getElementById('payment-form-container').classList.remove('hidden');
                statusEl.className = "text-center text-sm font-semibold text-red-600 mt-4 min-h-5";
                statusEl.textContent = err.message;
            }
        });
    </script>
</body>
</html>
