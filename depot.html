    <style>
        :root {
            --primary-color: #007BFF;
            --hover-color: #0056b3;
            --moncash-color: #e51b24; /* Rouge caractéristique */
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: var(--text-main);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            color: var(--text-main);
            text-align: center;
            font-weight: 700;
        }

        .deposit-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 450px;
        }

        .deposit-method {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid #eaeaea;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .deposit-method:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }

        .deposit-method i {
            font-size: 32px;
            color: var(--primary-color);
            margin-bottom: 12px;
        }

        .deposit-method span {
            font-size: 16px;
            font-weight: 600;
        }

        /* Style spécifique pour MonCash */
        #moncashDeposit:hover {
            border-color: var(--moncash-color);
        }
        
        .moncash-logo {
            height: 35px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .code {
            margin-top: 12px;
            font-weight: bold;
            color: var(--primary-color);
            font-size: 14px;
            letter-spacing: 1px;
        }

        .action-button {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: white !important;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .action-button:hover {
            background-color: var(--hover-color);
        }
        
        /* Version secondaire du bouton pour WhatsApp */
        .btn-whatsapp {
            background-color: #25D366;
        }
        .btn-whatsapp:hover {
            background-color: #128C7E;
        }
    </style>

    <script>
        // Récupération des données utilisateur
        const userString = localStorage.getItem('user');
        let user = null;
        if (userString) {
            try {
                user = JSON.parse(userString);
            } catch (e) {
                console.error("Erreur de données utilisateur:", e);
            }
        }

        const numeroCarte = user ? user.NumeroCarte : null;
        const lastFourDigits = numeroCarte ? numeroCarte.slice(-4) : '';

        // Éléments du DOM
        const moncashDeposit = document.getElementById('moncashDeposit');
        const agentDeposit = document.getElementById('agentDeposit');
        const agentCode = document.getElementById('agentCode');
        const whatsappDeposit = document.getElementById('whatsappDeposit');
        
        // Redirection vers MonCash
        if (moncashDeposit) {
            moncashDeposit.addEventListener('click', () => {
                window.location.href = 'moncash.html';
            });
        }

        // Dépôt par Agent
        if (agentDeposit) {
            agentDeposit.addEventListener('click', () => {
                window.location.href = 'depot-agents.html';
            });
        }
        
        // Dépôt par WhatsApp
        if (whatsappDeposit) {
            whatsappDeposit.addEventListener('click', () => {
                const message = encodeURIComponent('Bonjour, je souhaite effectuer un dépôt sur mon compte MIJO PAY.');
                const phoneNumber = '50944990203';
                window.open(`https://wa.me/${phoneNumber}?text=${message}`, '_blank');
            });
        }
        
        // Initialisation du code agent
        if (agentCode) {
            agentCode.textContent = '';
        }
    </script>
