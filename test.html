<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Le Cercle — MIJOPAY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* ── Palette : le cercle des membres, chacun sa teinte ── */
      --paper:       #F5F3EE;
      --surface:     #FFFFFF;
      --ink:         #14181F;
      --ink-soft:    #6B7280;
      --line:        rgba(20, 24, 31, 0.09);
      --line-strong: rgba(20, 24, 31, 0.16);

      --acc-blue:    #2451D6;
      --acc-blue-bg: rgba(36, 81, 214, 0.09);
      --acc-gold:    #A8791F;
      --acc-gold-bg: rgba(168, 121, 31, 0.12);
      --acc-teal:    #1B7A63;
      --acc-teal-bg: rgba(27, 122, 99, 0.10);
      --acc-wine:    #9C3B4C;
      --acc-wine-bg: rgba(156, 59, 76, 0.10);

      --radius-sm:  8px;
      --radius-md:  16px;
      --radius-lg:  22px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      background-image:
        radial-gradient(circle at 12% 0%, rgba(36,81,214,0.05), transparent 40%),
        radial-gradient(circle at 100% 20%, rgba(168,121,31,0.05), transparent 35%);
      font-family: 'Space Grotesk', sans-serif;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(245, 243, 238, 0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      font-family: 'Fraunces', serif;
      font-optical-sizing: auto;
      font-size: 21px;
      font-weight: 600;
      letter-spacing: -0.3px;
      position: relative;
    }

    .header-title::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: -4px;
      height: 2px;
      background: linear-gradient(90deg, var(--acc-gold), transparent);
    }

    .header-subtitle {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 1.4px;
      margin-top: 3px;
      display: block;
    }

    .back-btn {
      text-decoration: none;
      color: var(--ink);
      font-weight: 600;
      font-size: 19px;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .back-btn:hover { background: var(--line); }

    /* ── RANG DES MEMBRES ACTIFS ── */
    .members-rail {
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
      padding: 16px 16px 4px;
      display: flex;
      gap: 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .members-rail::-webkit-scrollbar { display: none; }
    .members-rail.empty { display: none; }

    .member-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      width: 56px;
    }

    .member-ring {
      width: 46px; height: 46px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 15px;
      background: var(--surface);
      position: relative;
    }
    .member-ring::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      padding: 2px;
      background: conic-gradient(var(--ring-color) 0 100%);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.85;
    }

    .member-name {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--ink-soft);
      max-width: 56px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── FEED ── */
    .feed-container {
      flex: 1;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
      padding: 12px 16px 130px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .state-msg {
      text-align: center;
      padding: 48px 20px;
      color: var(--ink-soft);
      font-size: 13.5px;
      line-height: 1.6;
    }
    .state-msg .state-title {
      font-family: 'Fraunces', serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--ink);
      display: block;
      margin-bottom: 6px;
    }
    .retry-btn {
      margin-top: 14px;
      background: var(--ink);
      color: var(--surface);
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 18px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 12.5px;
      cursor: pointer;
    }

    /* ── POST CARD ── */
    .post-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 18px 18px 16px;
      box-shadow: 0 1px 2px rgba(20,24,31,0.03), 0 8px 24px rgba(20,24,31,0.03);
      animation: rise 0.35s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 12px;
    }

    .author-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 14px;
      flex-shrink: 0;
      border: 1.5px solid var(--avatar-color, var(--acc-blue));
      background: var(--avatar-bg, var(--acc-blue-bg));
      color: var(--avatar-color, var(--acc-blue));
    }

    .author-meta { display: flex; flex-direction: column; min-width: 0; }

    .author-name {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 14.5px;
      color: var(--ink);
      letter-spacing: -0.1px;
    }

    .post-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--ink-soft);
      letter-spacing: 0.2px;
    }

    .post-content {
      font-size: 14.5px;
      line-height: 1.65;
      color: var(--ink);
      margin-bottom: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── ACTIONS ── */
    .post-actions {
      display: flex;
      gap: 6px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
      margin-top: 2px;
    }

    .action-btn {
      background: transparent;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink-soft);
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      transition: background 0.15s, color 0.15s;
    }
    .action-btn:hover { background: var(--paper); color: var(--ink); }
    .action-btn.liked { color: var(--acc-blue); background: var(--acc-blue-bg); }
    .action-btn.liked:hover { background: var(--acc-blue-bg); }

    .action-icon { font-size: 14px; line-height: 1; transition: transform 0.2s ease; }
    .action-btn.liked .action-icon { transform: translateY(-1px); }

    /* ── RÉPONSES : le fil du cercle ── */
    .replies-container {
      margin-top: 14px;
      padding-left: 22px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .replies-container::before {
      content: "";
      position: absolute;
      left: 8px; top: 4px; bottom: 12px;
      width: 1.5px;
      background: var(--line-strong);
      border-radius: 2px;
    }

    .reply-item { position: relative; }
    .reply-item::before {
      content: "";
      position: absolute;
      left: -14px; top: 16px;
      width: 12px; height: 1.5px;
      background: var(--line-strong);
    }

    .reply-item .author-avatar { width: 28px; height: 28px; font-size: 11px; border-width: 1px; }
    .reply-item .author-name { font-size: 13px; }
    .reply-item .post-content { font-size: 13.5px; margin-bottom: 0; }
    .reply-item .post-header { margin-bottom: 6px; }

    /* ── COMPOSER ── */
    .composer-wrapper {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(245, 243, 238, 0.92);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--line);
      padding: 12px 16px 22px;
    }

    .composer-inner {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .reply-banner {
      display: none;
      font-size: 12px;
      color: var(--acc-blue);
      font-weight: 600;
      margin-bottom: 8px;
      justify-content: space-between;
      align-items: center;
      background: var(--acc-blue-bg);
      padding: 7px 12px;
      border-radius: 10px;
    }
    .reply-banner.active { display: flex; }
    .cancel-reply {
      cursor: pointer; color: var(--acc-blue); font-size: 17px; line-height: 1;
      opacity: 0.7;
    }
    .cancel-reply:hover { opacity: 1; }

    .composer-row {
      display: flex; gap: 10px; align-items: flex-end; width: 100%;
    }

    .composer-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--line);
      border-radius: var(--radius-md);
      padding: 13px 15px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14.5px;
      color: var(--ink);
      resize: none;
      min-height: 48px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .composer-input:focus {
      border-color: var(--acc-blue);
      box-shadow: 0 0 0 3px var(--acc-blue-bg);
    }
    .composer-input::placeholder { color: #9AA1AC; }

    .publish-btn {
      background: var(--ink);
      color: var(--surface);
      border: none;
      border-radius: var(--radius-sm);
      height: 48px;
      padding: 0 20px;
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .publish-btn:hover { background: var(--acc-blue); }
    .publish-btn:active { transform: scale(0.96); }
    .publish-btn:disabled { background: var(--ink-soft); cursor: not-allowed; opacity: 0.5; }

    @media (prefers-reduced-motion: reduce) {
      .post-card { animation: none; }
      * { transition: none !important; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <a href="home.html" class="back-btn" aria-label="Retour">←</a>
    <div style="text-align: center;">
      <h1 class="header-title">Le Cercle</h1>
      <span class="header-subtitle">Réseau d'entrepreneurs</span>
    </div>
    <div style="width: 32px;"></div>
  </header>

  <!-- Membres actifs -->
  <div class="members-rail" id="membersRail"></div>

  <!-- Feed -->
  <main class="feed-container" id="feedContainer"></main>

  <!-- Composer -->
  <div class="composer-wrapper">
    <div class="composer-inner">
      <div class="reply-banner" id="replyBanner">
        <span id="replyingToText">En réponse à...</span>
        <span class="cancel-reply" onclick="cancelReply()">×</span>
      </div>
      <div class="composer-row">
        <textarea id="composerInput" class="composer-input" placeholder="Partagez une stratégie ou posez une question..." rows="1" oninput="autoGrow(this)"></textarea>
        <button id="publishBtn" class="publish-btn" onclick="publishMessage()">Publier</button>
      </div>
    </div>
  </div>

  <script>
    // ── CONFIGURATION CLOUDFLARE ──
    const API_BASE_URL = "https://reseau.mijocomplexe.workers.dev/api";

    // ── COULEURS DU CERCLE ──
    // Chaque membre garde toujours la même teinte, d'une session à l'autre.
    const CERCLE_COLORS = [
      { name: 'blue', hex: '#2451D6', bg: 'rgba(36, 81, 214, 0.09)' },
      { name: 'gold', hex: '#A8791F', bg: 'rgba(168, 121, 31, 0.12)' },
      { name: 'teal', hex: '#1B7A63', bg: 'rgba(27, 122, 99, 0.10)' },
      { name: 'wine', hex: '#9C3B4C', bg: 'rgba(156, 59, 76, 0.10)' },
    ];

    function colorFor(nameOrId) {
      const str = String(nameOrId || 'anon');
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = (hash * 31 + str.charCodeAt(i)) >>> 0;
      return CERCLE_COLORS[hash % CERCLE_COLORS.length];
    }

    // 1. IDENTIFICATION UTILISATEUR (Depuis LocalStorage)
    let currentUser = { id: "anonymous", name: "Anonyme", initials: "AN" };

    function initUser() {
      try {
        const storedUser = JSON.parse(localStorage.getItem("user"));
        if (storedUser) {
          const fullName = storedUser.name || storedUser.NomUtilisateur || "Utilisateur MIJO";
          const initials = fullName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();

          currentUser = {
            id: storedUser.userId || storedUser.telephone || Date.now().toString(),
            name: fullName,
            initials: initials
          };
        }
      } catch (e) {
        console.error("Erreur lecture utilisateur:", e);
      }
    }

    // 2. ÉTAT DU CERCLE
    let replyingToId = null;
    let postsData = [];

    // 3. FETCH : RÉCUPÉRER LES DONNÉES DEPUIS CLOUDFLARE
    async function chargerFeed() {
      const container = document.getElementById('feedContainer');
      container.innerHTML = `<div class="state-msg"><span class="state-title">Chargement du Cercle…</span>On rassemble les dernières idées.</div>`;

      try {
        const response = await fetch(`${API_BASE_URL}/posts`);
        if (!response.ok) throw new Error("Erreur serveur");

        postsData = await response.json();

        if (postsData.length === 0) {
          container.innerHTML = `<div class="state-msg"><span class="state-title">Le Cercle est encore silencieux</span>Soyez le premier à partager une stratégie ou une question.</div>`;
          document.getElementById('membersRail').innerHTML = '';
        } else {
          renderMembersRail();
          renderFeed();
        }
      } catch (error) {
        console.error("Erreur lors du chargement:", error);
        container.innerHTML = `<div class="state-msg"><span class="state-title">Connexion au Cercle impossible</span>Vérifiez votre réseau, puis réessayez.<br><button class="retry-btn" onclick="chargerFeed()">Réessayer</button></div>`;
      }
    }

    // 4. RANG DES MEMBRES ACTIFS
    function renderMembersRail() {
      const rail = document.getElementById('membersRail');
      const seen = new Map();
      postsData.forEach(post => {
        if (!seen.has(post.author.name)) seen.set(post.author.name, post.author);
      });

      if (seen.size === 0) { rail.innerHTML = ''; rail.classList.add('empty'); return; }
      rail.classList.remove('empty');

      let html = '';
      seen.forEach((author, name) => {
        const c = colorFor(name);
        html += `
          <div class="member-chip">
            <div class="member-ring" style="--ring-color:${c.hex}; color:${c.hex};">${author.initials}</div>
            <span class="member-name">${name.split(' ')[0]}</span>
          </div>
        `;
      });
      rail.innerHTML = html;
    }

    // 5. LOGIQUE D'AFFICHAGE
    function renderFeed() {
      const container = document.getElementById('feedContainer');
      container.innerHTML = '';

      postsData.forEach(post => {
        const isLikedByMe = post.likedBy && post.likedBy.includes(currentUser.id);
        const c = colorFor(post.author.name);

        const postHTML = `
          <article class="post-card" id="${post.id}">
            <div class="post-header">
              <div class="author-avatar" style="--avatar-color:${c.hex}; --avatar-bg:${c.bg};">${post.author.initials}</div>
              <div class="author-meta">
                <span class="author-name">${post.author.name}</span>
                <span class="post-time">${post.timestamp}</span>
              </div>
            </div>

            <div class="post-content">${post.content}</div>

            <div class="post-actions">
              <button class="action-btn ${isLikedByMe ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
                <span class="action-icon">↑</span> <span id="like-count-${post.id}">${post.likes}</span> Utile
              </button>
              <button class="action-btn" onclick="prepareReply('${post.id}', '${post.author.name}')">
                <span class="action-icon">↩</span> Répondre
              </button>
            </div>

            ${renderReplies(post.replies)}
          </article>
        `;
        container.insertAdjacentHTML('beforeend', postHTML);
      });
    }

    function renderReplies(replies) {
      if (!replies || replies.length === 0) return '';
      let repliesHTML = '<div class="replies-container">';
      replies.forEach(reply => {
        const c = colorFor(reply.author.name);
        repliesHTML += `
          <div class="reply-item" id="${reply.id}">
            <div class="post-header">
              <div class="author-avatar" style="--avatar-color:${c.hex}; --avatar-bg:${c.bg};">${reply.author.initials}</div>
              <div class="author-meta">
                <span class="author-name">${reply.author.name}</span>
                <span class="post-time">${reply.timestamp}</span>
              </div>
            </div>
            <div class="post-content">${reply.content}</div>
          </div>
        `;
      });
      repliesHTML += '</div>';
      return repliesHTML;
    }

    // 6. POST : PUBLIER UN MESSAGE (Vers Cloudflare)
    async function publishMessage() {
      const input = document.getElementById('composerInput');
      const btn = document.getElementById('publishBtn');
      const content = input.value.trim();

      if (!content) return;

      btn.disabled = true;
      btn.textContent = '...';

      const payload = {
        userId: currentUser.id,
        authorName: currentUser.name,
        authorInitials: currentUser.initials,
        content: content,
        parentId: replyingToId
      };

      try {
        const response = await fetch(`${API_BASE_URL}/posts`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error("Erreur publication");

        input.value = '';
        input.style.height = '50px';
        cancelReply();
        await chargerFeed();

      } catch (error) {
        alert("Impossible de publier pour le moment. Réessayez dans un instant.");
        console.error(error);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Publier';
      }
    }

    // 7. POST : LIKER UN MESSAGE (Vers Cloudflare)
    async function toggleLike(postId) {
      const post = postsData.find(p => p.id === postId);
      if (!post) return;

      const isLikedByMe = post.likedBy && post.likedBy.includes(currentUser.id);

      if (isLikedByMe) {
        post.likes -= 1;
        post.likedBy = post.likedBy.filter(id => id !== currentUser.id);
      } else {
        post.likes += 1;
        if (!post.likedBy) post.likedBy = [];
        post.likedBy.push(currentUser.id);
      }
      renderFeed();

      try {
        await fetch(`${API_BASE_URL}/likes`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: currentUser.id,
            postId: postId
          })
        });
      } catch (error) {
        console.error("Erreur lors de l'enregistrement du like", error);
      }
    }

    // Gérer la boîte de réponse
    function prepareReply(postId, authorName) {
      replyingToId = postId;
      document.getElementById('replyingToText').textContent = `En réponse à ${authorName}...`;
      document.getElementById('replyBanner').classList.add('active');
      document.getElementById('composerInput').focus();
    }

    function cancelReply() {
      replyingToId = null;
      document.getElementById('replyBanner').classList.remove('active');
    }

    function autoGrow(element) {
      element.style.height = "5px";
      element.style.height = (element.scrollHeight) + "px";
    }

    document.addEventListener('DOMContentLoaded', () => {
      initUser();
      chargerFeed();
    });
  </script>
</body>
</html>
