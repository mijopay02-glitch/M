<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mes Biens | MIJO STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;width:100%;scroll-behavior:smooth}
:root{
  --orange:#FF5C00;
  --orange-soft:#FF7A2F;
  --navy:#0D1525;
  --navy2:#151F35;
  --navy3:#1C2840;
  --card-bg:#192236;
  --card-border:rgba(255,255,255,0.07);
  --gold:#FFB800;
  --green:#00C97F;
  --white:#FFFFFF;
  --text:#E8EBF2;
  --text-muted:#7A86A0;
  --radius:16px;
  --radius-sm:10px;
  --shadow:0 4px 24px rgba(0,0,0,0.35);
}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--text);padding-bottom:90px}

/* HEADER */
header{
  background:rgba(13,21,37,0.95);
  backdrop-filter:blur(20px);
  padding:18px 20px;
  position:sticky;top:0;z-index:900;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.header-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:12px}
.header-inner h1{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:var(--white)}
.header-inner h1 span{color:var(--orange)}
.header-sub{font-size:0.75rem;color:var(--text-muted);margin-top:2px}

.container{max-width:900px;margin:0 auto;padding:20px}

/* STATS BAR */
.stats-bar{display:flex;gap:12px;margin-bottom:24px}
.stat-box{
  flex:1;background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:var(--radius-sm);padding:14px;text-align:center;
}
.stat-box span{display:block;font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--orange)}
.stat-box small{font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:20px}
.search-wrap input{
  width:100%;background:var(--navy3);border:1px solid var(--card-border);
  color:var(--text);padding:11px 16px 11px 42px;
  border-radius:var(--radius-sm);font-size:0.88rem;outline:none;
  transition:.2s;font-family:'Inter',sans-serif;
}
.search-wrap input:focus{border-color:var(--orange);background:var(--navy2)}
.search-wrap input::placeholder{color:var(--text-muted)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:0.9rem;color:var(--text-muted)}

/* GRID */
.products-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(min-width:600px){.products-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}}

.product-card{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:var(--radius);
  padding:16px;
  display:flex;flex-direction:column;
  transition:transform .2s,border-color .2s;
}
.product-card:hover{transform:translateY(-3px);border-color:rgba(255,92,0,0.3)}
.product-icon{
  width:46px;height:46px;border-radius:12px;
  background:linear-gradient(135deg,var(--orange),var(--orange-soft));
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;margin-bottom:12px;
  box-shadow:0 4px 14px rgba(255,92,0,0.25);
}
.product-cat{font-size:0.62rem;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);font-weight:600;margin-bottom:4px}
.product-name{font-family:'Syne',sans-serif;font-size:0.92rem;font-weight:700;color:var(--white);line-height:1.3;margin-bottom:6px;min-height:36px}
.product-vendeur{font-size:0.7rem;color:var(--text-muted);margin-bottom:4px}
.product-date{font-size:0.65rem;color:var(--text-muted);margin-bottom:14px;opacity:.7}
.product-actions{margin-top:auto}

.access-btn{
  background:var(--orange);color:#fff;text-decoration:none;
  padding:10px;border-radius:var(--radius-sm);font-size:0.8rem;
  font-weight:700;font-family:'Syne',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:.2s;width:100%;border:none;cursor:pointer;
}
.access-btn:hover{background:var(--orange-soft)}
.access-btn.disabled{
  background:var(--navy3);color:var(--text-muted);
  border:1px solid var(--card-border);cursor:not-allowed;
}

/* SKELETON */
.skeleton{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px}
.skel-icon{width:46px;height:46px;border-radius:12px;background:linear-gradient(90deg,var(--navy3) 25%,var(--navy2) 50%,var(--navy3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;margin-bottom:12px}
.skel-line{height:10px;border-radius:6px;background:linear-gradient(90deg,var(--navy3) 25%,var(--navy2) 50%,var(--navy3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;margin-bottom:8px}
.skel-line.short{width:50%}
.skel-btn{height:38px;border-radius:var(--radius-sm);background:linear-gradient(90deg,var(--navy3) 25%,var(--navy2) 50%,var(--navy3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;margin-top:10px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* EMPTY STATE */
.empty-state{
  grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-muted);
}
.empty-state .empty-icon{font-size:3.5rem;margin-bottom:16px;opacity:.6}
.empty-state h3{font-family:'Syne',sans-serif;color:var(--white);font-size:1.1rem;margin-bottom:8px}
.empty-state p{font-size:0.85rem;margin-bottom:20px;line-height:1.5}
.empty-state a{
  display:inline-block;background:var(--orange);color:#fff;text-decoration:none;
  padding:12px 24px;border-radius:var(--radius-sm);font-weight:700;
  font-family:'Syne',sans-serif;font-size:0.85rem;
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;width:100%;
  background:rgba(13,21,37,0.97);
  backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.06);
  display:flex;justify-content:space-around;align-items:center;
  padding:10px 0 max(10px,env(safe-area-inset-bottom));
  z-index:800;
}
.nav-item{text-decoration:none;color:var(--text-muted);text-align:center;font-size:0.62rem;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:4px;transition:.2s;padding:0 12px}
.nav-item .nav-icon{font-size:1.3rem;line-height:1}
.nav-item.active{color:var(--orange)}
.nav-item:hover{color:var(--orange)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--navy3);border-radius:4px}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1>📦 Mes <span>Biens</span></h1>
      <div class="header-sub">Tous tes produits achetés sur MIJO STORE</div>
    </div>
  </div>
</header>

<div class="container">

  <div class="stats-bar">
    <div class="stat-box">
      <span id="stat-total">0</span>
      <small>Produits</small>
    </div>
    <div class="stat-box">
      <span id="stat-spent">0 G</span>
      <small>Dépensé</small>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher dans mes produits…">
  </div>

  <div class="products-grid" id="products-grid">
    <!-- Skeletons pendant le chargement -->
    <div class="skeleton"><div class="skel-icon"></div><div class="skel-line short"></div><div class="skel-line"></div><div class="skel-btn"></div></div>
    <div class="skeleton"><div class="skel-icon"></div><div class="skel-line short"></div><div class="skel-line"></div><div class="skel-btn"></div></div>
    <div class="skeleton"><div class="skel-icon"></div><div class="skel-line short"></div><div class="skel-line"></div><div class="skel-btn"></div></div>
  </div>

</div>

<nav class="bottom-nav">
  <a href="home.html" class="nav-item"><span class="nav-icon">🏠</span>Accueil</a>
  <a href="store.html" class="nav-item"><span class="nav-icon">🛍️</span>Store</a>
  <a href="historique.html" class="nav-item"><span class="nav-icon">📜</span>Commandes</a>
  <a href="mes-produits.html" class="nav-item active"><span class="nav-icon">📦</span>Mes Biens</a>
  <a href="premium.html" class="nav-item"><span class="nav-icon">⭐</span>Premium</a>
</nav>

<script>
const WORKER_URL = 'https://produit.mijocomplexe.workers.dev/';

// Icônes par catégorie
const ICON_MAP = {
  'application':              '📱',
  'e-book':                   '📚',
  'business':                 '💼',
  'intelligence artificielle':'🤖',
  'soft skills':              '🧠',
  'marketing':                '📈',
  'développement personnel':  '🌱'
};

let allProducts = [];

async function loadMyProducts() {
  const userString = localStorage.getItem('user');
  if (!userString) {
    window.location.href = 'login.html';
    return;
  }
  const user = JSON.parse(userString);
  const grid = document.getElementById('products-grid');

  try {
    const response = await fetch(`${WORKER_URL}?userId=${encodeURIComponent(user.userId)}`, {
      method: 'GET'
    });

    const data = await response.json();

    if (!response.ok || !data.success) {
      grid.innerHTML = `<div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <h3>Erreur de chargement</h3>
        <p>Impossible de charger tes produits pour le moment.</p>
      </div>`;
      return;
    }

    allProducts = data.produits || [];
    renderProducts(allProducts);
    updateStats(allProducts);

  } catch (error) {
    console.error("Erreur:", error);
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <h3>Erreur de connexion</h3>
      <p>Vérifie ta connexion internet et réessaie.</p>
    </div>`;
  }
}

function updateStats(products) {
  document.getElementById('stat-total').textContent = products.length;
  const total = products.reduce((sum, p) => sum + (Number(p.montant) || 0), 0);
  document.getElementById('stat-spent').textContent = total.toLocaleString('fr-FR') + ' G';
}

function renderProducts(products) {
  const grid = document.getElementById('products-grid');
  grid.innerHTML = ''; // Nettoyage propre

  if (!products || products.length === 0) {
    grid.innerHTML = `<div class="empty-state">...</div>`; // (Gardez votre code existant ici)
    return;
  }

  products.forEach(p => {
    const icon = ICON_MAP[(p.categorie || '').toLowerCase()] || '🎁';
    const hasLien = p.lien && p.lien.trim() !== '' && !p.lien.includes('LIEN_') && p.lien !== 'Lien_ici';
    const dateFormat = p.dateAchat ? new Date(p.dateAchat).toLocaleDateString('fr-FR', {day:'numeric', month:'short', year:'numeric'}) : '';

    // Création sécurisée de la carte produit
    const card = document.createElement('div');
    card.className = 'product-card';

    // Utilisation de textContent pour toutes les données venant de l'API
    card.innerHTML = `
      <div class="product-icon">${icon}</div>
      <div class="product-cat"></div>
      <div class="product-name"></div>
      <div class="product-vendeur"></div>
      <div class="product-date"></div>
      <div class="product-actions"></div>
    `;

    // Injection sécurisée : textContent empêche toute interprétation de balise HTML
    card.querySelector('.product-cat').textContent = p.categorie || 'Produit';
    card.querySelector('.product-name').textContent = p.nom;
    card.querySelector('.product-vendeur').textContent = p.vendeur ? `Par ${p.vendeur}` : '';
    card.querySelector('.product-date').textContent = dateFormat;

    // Gestion du bouton avec lien
    const actions = card.querySelector('.product-actions');
    if (hasLien) {
      const a = document.createElement('a');
      a.href = p.lien;
      a.target = "_blank";
      a.className = "access-btn";
      a.textContent = "📥 Télécharger";
      actions.appendChild(a);
    } else {
      const btn = document.createElement('button');
      btn.className = "access-btn disabled";
      btn.disabled = true;
      btn.textContent = "🔒 Lien indisponible";
      actions.appendChild(btn);
    }

    grid.appendChild(card);
  });
}

// Recherche
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  const filtered = allProducts.filter(p =>
    (p.nom || '').toLowerCase().includes(q) ||
    (p.categorie || '').toLowerCase().includes(q) ||
    (p.vendeur || '').toLowerCase().includes(q)
  );
  renderProducts(filtered);
});

loadMyProducts();
</script>
</body>
</html>
