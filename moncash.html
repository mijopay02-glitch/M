<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonCash | MIJO PAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2=family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div id="payment-form-container" class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full border border-gray-100 transition-all duration-300">
        <div class="flex items-center justify-center gap-2 mb-6">
            <span class="text-2xl font-black tracking-wider text-gray-900">MIJO<span class="text-red-600">PAY</span></span>
        </div>

        <h1 class="text-2xl font-bold text-gray-800 text-center mb-2">Recharge MonCash</h1>
        <p class="text-gray-500 text-sm text-center mb-8">
            Indiquez le montant en gourdes (HTG) que vous souhaitez ajouter à votre solde.
        </p>

        <form id="paymentForm" class="space-y-6">
            <div>
                <label for="amountInput" class="block text-sm font-semibold text-gray-700 mb-2">
                    Montant à déposer (HTG)
                </label>
                <div class="relative rounded-lg shadow-sm">
                    <input
                        id="amountInput"
                        type="number"
                        placeholder="Ex: 250"
                        class="w-full p-4 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500 text-lg font-medium"
                        min="100"
                        required
                    />
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                        <span class="text-gray-500 font-bold text-sm">HTG</span>
                    </div>
                </div>
                
                <!-- Petit récapitulatif dynamique des frais -->
                <div id="feeDisplay" class="hidden flex justify-between items-center mt-3 px-1 text-sm font-medium text-gray-500">
                    <span>Frais MonCash :</span>
                    <span id="feeAmount" class="text-gray-700">0.00 HTG</span>
                </div>

                <p class="text-xs text-gray-400 mt-2">Dépôt minimum obligatoire : 100 HTG</p>
            </div>

            <button
                type="submit"
                id="submitBtn"
                class="w-full bg-[#cc0000] hover:bg-[#a30000] text-white font-bold py-4 px-4 rounded-xl shadow-lg shadow-red-100 transition-all duration-300 flex items-center justify-center gap-2"
            >
                <span id="submitBtnText">Continuer vers MonCash</span>
            </button>
        </form>

        <div id="statusMessage" class="text-center text-sm font-semibold text-red-600 mt-4 h-5"></div>
    </div>

    <!-- Écran d'attente mis à jour pour MonCash Connect -->
    <div id="redirecting-message" class="hidden bg-white rounded-2xl shadow-xl p-8 max-w-md w-full text-center border border-gray-100">
        <div class="flex justify-center mb-6">
            <svg class="animate-spin h-12 w-12 text-[#cc0000]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Connexion sécurisée...</h1>
        <p class="text-gray-500 text-sm">
            Préparation de votre facture MonCash Connect. Veuillez ne pas fermer cette fenêtre.
        </p>
    </div>

    <script>
       // ── Worker 1 : initialise la session de paiement MonCash Connect
        const WORKER_DEPOT_URL = 'https://depot-moncash-connect.mijocomplexe.workers.dev';

        const paymentForm        = document.getElementById('paymentForm');
        const amountInput        = document.getElementById('amountInput');
        const feeDisplay         = document.getElementById('feeDisplay');
        const feeAmount          = document.getElementById('feeAmount');
        const submitBtnText      = document.getElementById('submitBtnText');
        const statusMessageEl    = document.getElementById('statusMessage');
        const formContainer      = document.getElementById('payment-form-container');
        const redirectingMessage = document.getElementById('redirecting-message');

        // ── Calcul en temps réel lors de la saisie ──
        amountInput.addEventListener('input', function() {
            const amount = parseFloat(amountInput.value);

            if (isNaN(amount) || amount <= 0) {
                feeDisplay.classList.add('hidden');
                submitBtnText.textContent = 'Continuer vers MonCash';
                return;
            }

            // Calcul des frais (5%) et du total général
            const calculatedFee = amount * 0.05;
            const totalToPay = amount + calculatedFee;

            // Mise à jour de l'affichage discret des frais
            feeAmount.textContent = `${calculatedFee.toFixed(2)} HTG`;
            feeDisplay.classList.remove('hidden');

            // Mise à jour du texte du bouton d'action principal
            submitBtnText.textContent = `Payer ${totalToPay.toFixed(2)} HTG`;
        });

        // ── Traitement de la soumission du formulaire ──
        paymentForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const baseAmount = parseFloat(amountInput.value);

            // Validation alignée sur DEPOT_MIN = 100 dans le Worker
            if (isNaN(baseAmount) || baseAmount < 100) {
                statusMessageEl.textContent = 'Le montant minimum de dépôt est de 100 HTG.';
                return;
            }

            statusMessageEl.textContent = '';

            // Calcul final du total à envoyer au Worker (Montant saisi + 5% de frais)
            const calculatedFee = baseAmount * 0.05;
            const totalWithFees = parseFloat((baseAmount + calculatedFee).toFixed(2));

            // Afficher l'écran d'attente
            formContainer.classList.add('hidden');
            redirectingMessage.classList.remove('hidden');

            try {
                // Récupérer la session utilisateur locale
                const userRaw = localStorage.getItem('user');
                if (!userRaw) throw new Error('Utilisateur non identifié. Veuillez vous connecter.');

                const user = JSON.parse(userRaw);
                if (!user || !user.userId) throw new Error('Identifiant utilisateur introuvable. Reconnectez-vous.');

                const userId = user.userId;

                // Appel au Worker 1 — On passe 'totalWithFees' pour que l'API facture le montant total réel
                const response = await fetch(WORKER_DEPOT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, amount: totalWithFees })
                });

                const data = await response.json();

                if (response.ok && data.success && data.paymentUrl) {
                    // Sauvegarder la référence pour depot-verification.html
                    localStorage.setItem('depotReference', data.reference);
                    // On stocke le montant net (ce que l'utilisateur aura réellement sur son solde après traitement)
                    localStorage.setItem('montantPaiement', baseAmount);

                    // Redirection vers la passerelle MonCash Connect
                    // CORRECTION : Validation stricte de l'URL MonCash
                    const targetUrl = String(data.paymentUrl);
                    
                    // Validation par expression régulière stricte
                    // Doit commencer par https:// et correspondre exactement aux domaines MonCash
                    const isValidMonCashUrl = /^https:\/\/(sandbox\.)?moncashbutton\.digicelgroup\.com\//.test(targetUrl);

                    if (isValidMonCashUrl) {
                        window.location.assign(targetUrl);
                    } else {
                        throw new Error("URL de redirection invalide ou non sécurisée.");
                    }

                } else {
                    throw new Error(data.error || 'Impossible d\'initialiser la session de paiement.');
                }

            } catch (err) {
                console.error('Erreur transactionnelle:', err);

                // Remettre le formulaire en cas d'erreur
                redirectingMessage.classList.add('hidden');
                formContainer.classList.remove('hidden');
                statusMessageEl.textContent = err.message;
            }
        });
    </script>

</body>
</html>
