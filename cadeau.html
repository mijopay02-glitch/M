<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIJO PAY - Spécial Fête des Mères</title>
    <style>
        :root {
            --mijo-gold: #D4AF37;
            --mijo-black: #1A1A1A;
            --mijo-dark: #111111;
        }

        body {
            background-color: var(--mijo-black);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background: linear-gradient(to bottom, #222, var(--mijo-black));
            border-bottom: 1px solid var(--mijo-gold);
            margin-bottom: 30px;
        }

        .logo { width: 150px; filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5)); }

        h1 {
            color: var(--mijo-gold);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 40px;
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid var(--mijo-gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            z-index: 10;
            filter: drop-shadow(0 2px 5px black);
        }

        .btn-spin {
            background: linear-gradient(45deg, var(--mijo-gold), #f1d56e);
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .btn-spin:disabled { opacity: 0.5; cursor: not-allowed; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--mijo-dark);
            border: 2px solid var(--mijo-gold);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }

        .modal-title { color: var(--mijo-gold); font-size: 1.8rem; margin-bottom: 15px; }
        .btn-modal {
            display: block; width: 100%; background: var(--mijo-gold);
            color: black; text-decoration: none; padding: 12px;
            border-radius: 10px; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <img src="https://i.postimg.cc/yYCsdY18/remove.png" alt="MIJO PAY" class="logo">
        <h1>Cadeau Fête des Mères</h1>
    </header>

    <div class="wheel-container">
        <svg class="pointer" viewBox="0 0 30 40">
            <path d="M15 40 L30 0 L0 0 Z" fill="#D4AF37"/>
        </svg>
        <canvas id="wheelCanvas" width="400" height="400"></canvas>
    </div>

    <button id="spinBtn" class="btn-spin" onclick="startSpin()">LANCER LA ROUE</button>

    <div id="resultModal" class="modal">
        <div class="modal-content">
            <div id="modalTitle" class="modal-title"></div>
            <div id="modalBody" class="modal-body" style="margin-bottom: 20px; line-height: 1.5;"></div>
            <div id="modalFooter"></div>
        </div>
    </div>

    <script>
    const PROMO_WORKER_URL = "https://votre-worker-promo.workers.dev/"; 
    const PDF_LINK = "https://drive.google.com/file/d/1OSdjQgjPRDMV_yNUHje69qG_v2EqToFY/view?usp=sharing";

    const segments = [
        { label: "5 $ US", type: "usd" },          // 0
        { label: "10 $ US", type: "usd" },         // 1
        { label: "15 $ US", type: "usd" },         // 2
        { label: "50 HTG", type: "promo" },        // 3
        { label: "100 HTG", type: "blocked" },     // 4
        { label: "250 HTG", type: "blocked" },     // 5
        { label: "Livre PDF", type: "promo" },     // 6
        { label: "Ciné +", type: "promo" }         // 7
    ];

    let canvas = document.getElementById('wheelCanvas');
    let ctx = canvas.getContext('2d');
    let spinBtn = document.getElementById('spinBtn');
    let currentRotation = 0; // On garde en mémoire pour ne jamais reculer
    let userData = null;

    window.addEventListener('DOMContentLoaded', () => {
        const storedUser = localStorage.getItem('user');
        if (!storedUser) { window.location.href = 'index.html'; return; }
        userData = JSON.parse(storedUser);
        drawWheel();
    });

    function drawWheel() {
        let arc = (2 * Math.PI) / segments.length;
        for (let i = 0; i < segments.length; i++) {
            let angle = i * arc;
            ctx.fillStyle = (i % 2 === 0) ? "#1A1A1A" : "#222";
            ctx.beginPath();
            ctx.moveTo(200, 200);
            ctx.arc(200, 200, 190, angle, angle + arc);
            ctx.fill();
            ctx.strokeStyle = "#D4AF37";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.save();
            ctx.translate(200, 200);
            ctx.rotate(angle + arc / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#D4AF37";
            ctx.font = "bold 16px Arial";
            ctx.fillText(segments[i].label, 170, 10);
            ctx.restore();
        }
    }

    async function startSpin() {
        spinBtn.disabled = true;
        const isUsActive = userData.Compte_US_Actif === "OUI" || userData.Compte_US_Actif === true;
        
        // --- SÉLECTION DU GAGNANT ---
        let possibleChoices = isUsActive 
            ? segments.filter(s => s.type === "promo") 
            : segments.filter(s => s.type === "usd");

        const winner = possibleChoices[Math.floor(Math.random() * possibleChoices.length)];
        const targetIndex = segments.indexOf(winner);

        // --- CALCUL DE LA ROTATION ---
        const degPerSegment = 360 / segments.length;
        
        // 247.5 est le "Magic Number" : (270° pour le haut - 22.5° pour le centre du premier segment)
        const targetAngle = 247.5 - (targetIndex * degPerSegment);
        
        // On ajoute 10 tours (3600°) + le décalage, tout en restant cumulatif
        const finalRotation = currentRotation + 3600 + (targetAngle - (currentRotation % 360));
        
        currentRotation = finalRotation;
        canvas.style.transform = `rotate(${currentRotation}deg)`;
        
        registerPlay(userData.userId);

        setTimeout(() => {
            showResult(winner, isUsActive);
        }, 5500);
    }

    function showResult(segment, isUsActive) {
        const modal = document.getElementById('resultModal');
        const title = document.getElementById('modalTitle');
        const body = document.getElementById('modalBody');
        const footer = document.getElementById('modalFooter');

        if (!isUsActive) {
            title.innerText = "ÉLIGIBILITÉ CONFIRMÉE !";
            body.innerHTML = `Bravo ! Vous avez aligné la bourse de <b>${segment.label}</b>.<br><br><span style="color:#ff4d4d">⚠ Statut : EN ATTENTE</span><br>Activez votre compte USD (200 Gdes) pour débloquer ce prix.`;
            footer.innerHTML = `<button onclick="activateUS()" class="btn-modal">ACTIVER MON COMPTE USD (200G)</button>`;
        } else {
            title.innerText = "FÉLICITATIONS !";
            if (segment.label === "Livre PDF") {
                body.innerHTML = `Vous avez gagné le livre : <br><b>"30 Idées de Business à Petit Budget"</b>.`;
                footer.innerHTML = `<a href="${PDF_LINK}" target="_blank" class="btn-modal">TÉLÉCHARGER LE PDF</a>`;
            } else {
                body.innerHTML = `Vous avez gagné : <b>${segment.label}</b> ! <br>Votre gain sera crédité sous 24h.`;
                footer.innerHTML = `<a href="home.html" class="btn-modal">RETOUR AU TABLEAU DE BORD</a>`;
            }
        }
        modal.style.display = "flex";
    }

    async function registerPlay(userId) {
        try { fetch(PROMO_WORKER_URL, { method: 'POST', body: JSON.stringify({ userId, action: 'mark_played' }) }); } catch(e){}
    }

    async function activateUS() {
        try {
            const res = await fetch(PROMO_WORKER_URL, { method: 'POST', body: JSON.stringify({ userId: userData.userId, action: 'activate_us' }) });
            if (res.ok) {
                userData.Compte_US_Actif = true;
                localStorage.setItem('user', JSON.stringify(userData));
                window.location.reload();
            }
        } catch(e) { alert("Erreur de connexion"); }
    }
</script>
</body>
</html>
