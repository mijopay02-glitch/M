<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIJO PAY - Spécial Fête des Mères</title>
    <style>
        :root {
            --mijo-gold: #D4AF37;
            --mijo-black: #1A1A1A;
            --mijo-dark: #111111;
        }

        body {
            background-color: var(--mijo-black);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background: linear-gradient(to bottom, #222, var(--mijo-black));
            border-bottom: 1px solid var(--mijo-gold);
            margin-bottom: 30px;
        }

        .logo { width: 150px; filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5)); }

        h1 {
            color: var(--mijo-gold);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 40px;
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid var(--mijo-gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            z-index: 10;
            filter: drop-shadow(0 2px 5px black);
        }

        .btn-spin {
            background: linear-gradient(45deg, var(--mijo-gold), #f1d56e);
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .btn-spin:disabled { opacity: 0.5; cursor: not-allowed; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--mijo-dark);
            border: 2px solid var(--mijo-gold);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }

        .modal-title { color: var(--mijo-gold); font-size: 1.8rem; margin-bottom: 15px; }
        .btn-modal {
            display: block; width: 100%; background: var(--mijo-gold);
            color: black; text-decoration: none; padding: 12px;
            border-radius: 10px; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <img src="https://i.postimg.cc/yYCsdY18/remove.png" alt="MIJO PAY" class="logo">
        <h1>Cadeau Fête des Mères</h1>
    </header>

    <div class="wheel-container">
        <svg class="pointer" viewBox="0 0 30 40">
            <path d="M15 40 L30 0 L0 0 Z" fill="#D4AF37"/>
        </svg>
        <canvas id="wheelCanvas" width="400" height="400"></canvas>
    </div>

    <button id="spinBtn" class="btn-spin" onclick="startSpin()">LANCER LA ROUE</button>

    <div id="resultModal" class="modal">
        <div class="modal-content">
            <div id="modalTitle" class="modal-title"></div>
            <div id="modalBody" class="modal-body" style="margin-bottom: 20px; line-height: 1.5;"></div>
            <div id="modalFooter"></div>
        </div>
    </div>

    <script>
    // 1. CONFIGURATION GLOBALE
    const PROMO_WORKER_URL = "https://rough-heart-d656.mijocomplexe.workers.dev/"; 
    const PDF_LINK = "https://drive.google.com/file/d/1OSdjQgjPRDMV_yNUHje69qG_v2EqToFY/view?usp=sharing";

    // AJOUT : La propriété 'amount' pour savoir combien créditer
    const segments = [
        { label: "5 $ US", type: "usd", amount: 5 },         // 0
        { label: "10 $ US", type: "usd", amount: 10 },       // 1
        { label: "15 $ US", type: "usd", amount: 15 },       // 2
        { label: "50 HTG", type: "promo", amount: 50 },      // 3
        { label: "100 HTG", type: "blocked", amount: 100 },  // 4
        { label: "250 HTG", type: "blocked", amount: 250 },  // 5
        { label: "Livre PDF", type: "promo", amount: 0 },    // 6
        { label: "Ciné +", type: "promo", amount: 0 }        // 7
    ];

    let canvas = document.getElementById('wheelCanvas');
    let ctx = canvas.getContext('2d');
    let spinBtn = document.getElementById('spinBtn');
    
    // VARIABLES D'ÉTAT
    let currentRotation = 0; 
    let lastResultIndex = null; 
    let userData = null;

    // 2. INITIALISATION
    window.addEventListener('DOMContentLoaded', () => {
        const storedUser = localStorage.getItem('user');
        if (!storedUser) { 
            window.location.href = 'index.html'; 
            return; 
        }
        userData = JSON.parse(storedUser);
        if (userData.Promo_Meres_Joue === true || userData.Promo_Meres_Joue === "OUI") {
            spinBtn.disabled = true;
            spinBtn.innerText = "DÉJÀ JOUÉ";
            alert("Vous avez déjà récupéré votre cadeau pour la Fête des Mères !");
        }
        drawWheel();
    });

    // 3. DESSIN DE LA ROUE
    function drawWheel() {
        let arc = (2 * Math.PI) / segments.length;
        for (let i = 0; i < segments.length; i++) {
            let angle = i * arc;
            ctx.fillStyle = (i % 2 === 0) ? "#1A1A1A" : "#222";
            ctx.beginPath();
            ctx.moveTo(200, 200);
            ctx.arc(200, 200, 190, angle, angle + arc);
            ctx.fill();
            ctx.strokeStyle = "#D4AF37";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.save();
            ctx.translate(200, 200);
            ctx.rotate(angle + arc / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#D4AF37";
            ctx.font = "bold 16px Arial";
            ctx.fillText(segments[i].label, 170, 10);
            ctx.restore();
        }
    }

    // 4. LOGIQUE DE LANCEMENT
    async function startSpin() {
        if (userData.Promo_Meres_Joue === true || userData.Promo_Meres_Joue === "OUI") return;
        spinBtn.disabled = true;
        const isUsActive = userData.Compte_US_Actif === "OUI" || userData.Compte_US_Actif === true;
        
        let possibleChoices = isUsActive 
            ? segments.filter((s, idx) => s.type === "promo" && idx !== lastResultIndex) 
            : segments.filter((s, idx) => s.type === "usd" && idx !== lastResultIndex);

        if (possibleChoices.length === 0) {
            possibleChoices = isUsActive 
                ? segments.filter(s => s.type === "promo") 
                : segments.filter(s => s.type === "usd");
        }

        const winner = possibleChoices[Math.floor(Math.random() * possibleChoices.length)];
        const targetIndex = segments.indexOf(winner);
        
        lastResultIndex = targetIndex;

        const degPerSegment = 360 / segments.length;
        const targetAngle = 247.5 - (targetIndex * degPerSegment);
        const rotationSupplementaire = 3600 + (targetAngle - (currentRotation % 360));
        currentRotation += rotationSupplementaire;
        
        canvas.style.transform = `rotate(${currentRotation}deg)`;
        
        registerPlay(userData.userId);
userData.Promo_Meres_Joue = true;
        localStorage.setItem('user', JSON.stringify(userData));
        setTimeout(() => {
            showResult(winner, isUsActive);
        }, 5500);
    }

    // 5. AFFICHAGE RÉSULTAT ET CRÉDIT DES GAINS
    function showResult(segment, isUsActive) {
        const modal = document.getElementById('resultModal');
        const title = document.getElementById('modalTitle');
        const body = document.getElementById('modalBody');
        const footer = document.getElementById('modalFooter');

        if (!isUsActive) {
            title.innerText = "ÉLIGIBILITÉ DÉTECTÉE !";
            body.innerHTML = `Félicitations ! Vous avez aligné le lot : <b>${segment.label}</b>.<br><br><span style="color:#ff4d4d">🔒 ACCÈS RESTREINT</span><br>Votre compte n'est pas encore "International". Activez-le pour débloquer vos gains.`;
            footer.innerHTML = `<button onclick="activateUS()" class="btn-modal">ACTIVER MON COMPTE USD (200G)</button>`;
        } else {
            title.innerText = "BRAVO !";
            if (segment.label === "Livre PDF") {
                body.innerHTML = `Vous gagnez : <br><b>"30 Idées de Business à Petit Budget"</b>.`;
                footer.innerHTML = `<a href="${PDF_LINK}" target="_blank" class="btn-modal">TÉLÉCHARGER MAINTENANT</a>`;
            } else if (segment.label === "Ciné +") {
                body.innerHTML = `Gagné : <b>${segment.label}</b> ! <br>Ce lot sera ajouté à votre profil.`;
                footer.innerHTML = `<a href="home.html" class="btn-modal">RETOUR AU PORTEFEUILLE</a>`;
            } else {
                body.innerHTML = `Gagné : <b>${segment.label}</b> ! <br>Ce montant sera ajouté à votre balance MIJO PAY.`;
                footer.innerHTML = `<a href="home.html" class="btn-modal">RETOUR AU PORTEFEUILLE</a>`;
                
                // AJOUT : On appelle la fonction pour créditer l'argent réel
                claimWin(segment.amount);
            }
        }
        modal.style.display = "flex";
    }

    // 6. FONCTIONS RÉSEAU
    async function registerPlay(userId) {
        try { fetch(PROMO_WORKER_URL, { method: 'POST', body: JSON.stringify({ userId, action: 'mark_played' }) }); } catch(e){}
    }

    // NOUVELLE FONCTION : Pour créditer les gains sur Airtable et dans le LocalStorage
    async function claimWin(amount) {
        if (!amount || amount <= 0) return; 

        try {
            const res = await fetch(PROMO_WORKER_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    userId: userData.userId, 
                    action: 'claim_prize',
                    amount: amount
                }) 
            });

            const data = await res.json();
            
            if (res.ok && data.nouveauSolde !== undefined) {
                // Mise à jour du solde dans le navigateur
                userData.Solde = data.nouveauSolde;
                localStorage.setItem('user', JSON.stringify(userData));
                console.log("Gain crédité avec succès ! Nouveau solde :", userData.Solde);
            }
        } catch(e) { 
            console.error("Erreur lors du crédit :", e);
        }
    }

    async function activateUS() {
        try {
            console.log("Tentative d'activation pour :", userData.userId);
            
            const res = await fetch(PROMO_WORKER_URL, { 
                method: 'POST', 
                headers: { 
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    userId: userData.userId, 
                    action: 'activate_us' 
                }) 
            });

            const data = await res.json();

            if (res.ok) {
                alert("Succès : " + data.message);
                
                // CORRECTION : On met à jour l'état et l'argent dans le stockage local
                userData.Compte_US_Actif = true;
                if (data.nouveauSolde !== undefined) {
                    userData.Solde = data.nouveauSolde;
                }
                
                localStorage.setItem('user', JSON.stringify(userData));
                window.location.reload();
            } else {
                alert("Erreur MIJO PAY : " + (data.message || "Erreur inconnue"));
            }
        } catch(e) { 
            console.error("Détail de l'erreur :", e);
            alert("Impossible de joindre le serveur. Vérifiez votre connexion ou si le Worker est bien déployé."); 
        }
    }
</script>
</body>
</html>
