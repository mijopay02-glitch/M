<style>

* { box-sizing: border-box; margin: 0; padding: 0; }
 
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
}
 
/* PARTICLES */
.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  animation: float linear infinite;
  opacity: 0;
}
@keyframes float {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
}
 
/* HEADER */
header {
  position: relative;
  z-index: 1;
  width: 100%;
  text-align: center;
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(0,32,159,0.15) 0%, transparent 100%);
}
 
.logo { width: 100px; filter: drop-shadow(0 0 12px rgba(212,175,55,0.4)); }
 
.flag-stripe {
  display: flex;
  justify-content: center;
  gap: 0;
  margin: 12px auto 8px;

  border-radius: 3px;

}
.flag-stripe .s1 { flex: 1; background: var(--blue-ht); }
.flag-stripe .s2 { flex: 1; background: var(--red-ht); }
 
h1 {
  color: var(--gold);

  text-shadow: 0 0 20px rgba(212,175,55,0.4);
}
 
.subtitle {

  letter-spacing: 1px;
}
 
/* MAIN */
main {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
  padding: 24px 20px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
 
/* USER BADGE */
.user-badge {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 8px 20px;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 24px;
  display: flex;
  align-items: center;

}
.user-badge .dot {
  width: 8px; height: 8px;

  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.user-badge strong { color: var(--gold); }
 
/* WHEEL WRAPPER */
.wheel-wrapper {
  position: relative;
  width: 300px;
  height: 300px;
  margin-bottom: 8px;
}
 
/* Outer glow ring */
.wheel-glow {
  position: absolute;
  inset: -16px;
  border-radius: 50%;
  background: conic-gradient(
    var(--blue-ht) 0deg 180deg,
    var(--red-ht) 180deg 360deg
  );
  opacity: 0.15;
  animation: rotateGlow 8s linear infinite;
  filter: blur(8px);
}
@keyframes rotateGlow { to { transform: rotate(360deg); } }
 
/* Gold ring */
.wheel-ring {
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 3px solid var(--gold);
  box-shadow: 0 0 20px rgba(212,175,55,0.3), inset 0 0 20px rgba(212,175,55,0.1);
}
 
/* Decorative dots on ring */
.wheel-dots {
  position: absolute;
  inset: -12px;
  border-radius: 50%;
}
.wheel-dot {
  position: absolute;
  width: 8px; height: 8px;
  background: var(--gold);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--gold);
  transform-origin: 162px 162px;
}
 
canvas#wheelCanvas {
  width: 300px;
  height: 300px;
  border-radius: 50%;
  position: relative;
  z-index: 2;
  transition: transform 5.5s cubic-bezier(0.12, 0, 0.08, 1);
}
 
/* POINTER */
.pointer {
  position: absolute;
  top: -28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
}
.pointer svg { display: block; }
 
/* Center hub */
.wheel-hub {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  width: 44px; height: 44px;

  border-radius: 50%;
  border: 3px solid #fff2;
  box-shadow: 0 0 15px rgba(212,175,55,0.5);

}
.spin-badge span { color: var(--gold); font-weight: 700; }
 
/* SPIN BUTTON */
.btn-spin {
  position: relative;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
  background-size: 200% 100%;
  color: #1a0e00;
  border: none;
  padding: 16px 48px;
  font-size: 1.1rem;
  font-weight: 800;

}
@keyframes shimmer {
  0% { background-position: 0% 0%; }
  50% { background-position: 100% 0%; }
  100% { background-position: 0% 0%; }
}
.btn-spin::before {
  content: '';

  top: 0; left: -100%;

.btn-spin:hover::before { left: 100%; }
.btn-spin:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(212,175,55,0.5); }

/* CONFETTI */
.confetti-container {

@keyframes confettiFall {

/* TICK ANIMATION */

<script>
const PROMO_WORKER_URL = "https://rough-heart-d656.mijocomplexe.workers.dev/";
const PDF_LINK = "https://drive.google.com/file/d/1OSdjQgjPRDMV_yNUHje69qG_v2EqToFY/view?usp=sharing";
 
const segments = [
  { label: "5 $ US",   type: "usd",     amount: 5,   color: "#00209F", light: "#4a6fd4" },
  { label: "10 $ US",  type: "usd",     amount: 10,  color: "#D21034", light: "#e84d6a" },
  { label: "15 $ US",  type: "usd",     amount: 15,  color: "#00209F", light: "#4a6fd4" },
  { label: "50 HTG",   type: "promo",   amount: 50,  color: "#1a1f38", light: "#2d3561" },
  { label: "100 HTG",  type: "blocked", amount: 100, color: "#111827", light: "#1f2937" },
  { label: "250 HTG",  type: "blocked", amount: 250, color: "#111827", light: "#1f2937" },
  { label: "Livre PDF",type: "promo",   amount: 0,   color: "#1a1f38", light: "#2d3561" },
  { label: "Ciné +",   type: "promo",   amount: 0,   color: "#1a1f38", light: "#2d3561" }
];
 
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
let currentRotation = 0;
let lastResultIndex = null;
let userData = null;
let isSpinning = false;
 
// ── INIT ──────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const stored = localStorage.getItem('user');
  if (!stored) { window.location.href = 'index.html'; return; }
  userData = JSON.parse(stored);
 
  document.getElementById('userName').textContent =
    userData.Nom || userData.NumeroCarte || 'Utilisateur';
 
  if (userData.Promo_Drapeau_Joue === true || userData.Promo_Drapeau_Joue === "OUI") {
    document.getElementById('spinBtn').disabled = true;
    document.getElementById('spinBtn').textContent = '✅ DÉJÀ JOUÉ';
    document.getElementById('playedMsg').style.display = 'block';
  }
 
  drawWheel();
  createParticles();
  createWheelDots();
});
 
// ── PARTICLES ─────────────────────────────────
function createParticles() {
  const container = document.getElementById('particles');
  const colors = ['#D4AF37','#00209F','#D21034','#F5D76E','#ffffff'];
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random()*100}%;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration: ${6 + Math.random()*8}s;
      animation-delay: ${Math.random()*8}s;
      width: ${2+Math.random()*4}px;
      height: ${2+Math.random()*4}px;
    `;
    container.appendChild(p);
  }
}
 
// ── WHEEL DOTS ────────────────────────────────
function createWheelDots() {
  const container = document.getElementById('wheelDots');
  for (let i = 0; i < 16; i++) {
    const d = document.createElement('div');
    d.className = 'wheel-dot';
    d.style.transform = `rotate(${i * 22.5}deg) translate(0, -162px)`;
    container.appendChild(d);
  }
}
 
// ── DRAW WHEEL ────────────────────────────────
function drawWheel() {
  const cx = 150, cy = 150, r = 145;
  const arc = (2 * Math.PI) / segments.length;
 
  for (let i = 0; i < segments.length; i++) {
    const startAngle = i * arc - Math.PI / 2;
    const endAngle = startAngle + arc;
    const seg = segments[i];
 
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();
 
    ctx.strokeStyle = 'rgba(212,175,55,0.4)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
 
    const midAngle = startAngle + arc / 2;
    const textR = r * 0.65;
    const tx = cx + Math.cos(midAngle) * textR;
    const ty = cy + Math.sin(midAngle) * textR;
 
    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(midAngle + Math.PI / 2);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
 
    if (seg.type === 'usd') {
      ctx.font = 'bold 15px Arial';
      ctx.fillStyle = '#ffffff';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 4;
    } else if (seg.type === 'promo') {
      ctx.font = 'bold 13px Arial';
      ctx.fillStyle = '#D4AF37';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 4;
    } else {
      ctx.font = '12px Arial';
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
    }
 
    ctx.fillText(seg.label, 0, 0);
    ctx.restore();
  }
 
  // Outer ring decoration
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(212,175,55,0.6)';
  ctx.lineWidth = 3;
  ctx.stroke();
 
  // Inner circle
  ctx.beginPath();
  ctx.arc(cx, cy, 24, 0, 2 * Math.PI);
  ctx.fillStyle = '#0a0c14';
  ctx.fill();
  ctx.strokeStyle = 'rgba(212,175,55,0.5)';
  ctx.lineWidth = 2;
  ctx.stroke();
}
 
// ── SPIN ──────────────────────────────────────
async function startSpin() {
  if (isSpinning) return;
  if (userData.Promo_Drapeau_Joue === true || userData.Promo_Drapeau_Joue === "OUI") return;
 
  isSpinning = true;
  const btn = document.getElementById('spinBtn');
  btn.disabled = true;
  btn.textContent = '🌀 EN COURS...';
 
  const isUsActive = userData.Compte_US_Actif === "OUI" || userData.Compte_US_Actif === true;
 
  let choices = isUsActive
    ? segments.filter((s, i) => s.type === "promo" && i !== lastResultIndex)
    : segments.filter((s, i) => s.type === "usd" && i !== lastResultIndex);
 
  if (choices.length === 0) {
    choices = isUsActive
      ? segments.filter(s => s.type === "promo")
      : segments.filter(s => s.type === "usd");
  }
 
  const winner = choices[Math.floor(Math.random() * choices.length)];
  const targetIndex = segments.indexOf(winner);
  lastResultIndex = targetIndex;
 
  const degPerSeg = 360 / segments.length;
  const targetAngle = 247.5 - (targetIndex * degPerSeg);
  const extra = 3960 + (targetAngle - (currentRotation % 360) + 360) % 360;
  currentRotation += extra;
 
  canvas.style.transform = `rotate(${currentRotation}deg)`;
 
  // Pointer tick animation
  animatePointerTick();
 
  if (isUsActive) {
    registerPlay(userData.userId || userData.NumeroCarte);
  }
 
  setTimeout(() => {
    isSpinning = false;
    showResult(winner, isUsActive);
  }, 5800);
}
 
function animatePointerTick() {
  const pointer = document.getElementById('pointer');
  let ticks = 0;
  const maxTicks = 80;
  let interval = 60;
 
  function tick() {
    pointer.style.animation = 'wheelTick 0.1s ease';
    setTimeout(() => { pointer.style.animation = ''; }, 100);
    ticks++;
    interval = Math.min(interval * 1.04, 300);
    if (ticks < maxTicks) setTimeout(tick, interval);
  }
  tick();
}
 
// ── SHOW RESULT ───────────────────────────────
function showResult(segment, isUsActive) {
  const modal = document.getElementById('resultModal');
  const icon = document.getElementById('modalIcon');
  const title = document.getElementById('modalTitle');
  const body = document.getElementById('modalBody');
  const footer = document.getElementById('modalFooter');
 
  if (!isUsActive) {
    icon.textContent = '🔒';
    title.textContent = 'Compte US requis !';
    body.innerHTML = `
      Vous avez aligné <b>${segment.label}</b> !<br><br>
      Ce lot est réservé aux comptes <b>internationaux</b>.<br>
      Activez votre compte USD pour débloquer vos gains et relancer la roue.
    `;
    footer.innerHTML = `
      <button onclick="activateUS()" class="btn-modal">🌍 ACTIVER MON COMPTE USD (200G)</button>
      <a href="home.html" class="btn-modal-secondary">Retour au portefeuille</a>
    `;
  } else {
    if (segment.label === "Livre PDF") {
      icon.textContent = '📚';
      title.textContent = 'Bravo !';
      body.innerHTML = `Vous gagnez :<br><b>"30 Idées de Business à Petit Budget"</b><br><br>Votre guide offert par MIJO PAY 🎁`;
      footer.innerHTML = `
        <a href="${PDF_LINK}" target="_blank" class="btn-modal">📥 TÉLÉCHARGER MAINTENANT</a>
        <a href="home.html" class="btn-modal-secondary">Retour au portefeuille</a>
      `;
    } else if (segment.label === "Ciné +") {
      icon.textContent = '🎬';
      title.textContent = 'Ciné + Gagné !';
      body.innerHTML = `Votre accès <b>MIJO CINÉ+</b> a été activé.<br>Profitez de vos films & séries ! 🎉`;
      footer.innerHTML = `
        <a href="home.html" class="btn-modal">🏠 RETOUR AU PORTEFEUILLE</a>
      `;
    } else {
      icon.textContent = '💰';
      title.textContent = 'Félicitations !';
      body.innerHTML = `
        Vous avez gagné :<br>
        <span class="modal-prize-amount">${segment.label}</span>
        Ce montant sera crédité sur votre balance MIJO PAY. 🎊
      `;
      footer.innerHTML = `
        <a href="home.html" class="btn-modal">🏠 VOIR MON SOLDE</a>
      `;
      claimWin(segment.amount);
      launchConfetti();
    }
    if (segment.label === "50 HTG") {
      icon.textContent = '🎁';
      claimWin(segment.amount);
      launchConfetti();
    }
  }
 
  setTimeout(() => { modal.classList.add('open'); }, 300);
}
 
// ── CONFETTI ──────────────────────────────────
function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#D4AF37','#F5D76E','#00209F','#D21034','#ffffff','#22c55e'];
  for (let i = 0; i < 80; i++) {
    const c = document.createElement('div');
    c.className = 'confetto';
    const size = 6 + Math.random() * 10;
    c.style.cssText = `
      left: ${Math.random() * 100}%;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      width: ${size}px;
      height: ${size}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${1.5 + Math.random() * 2}s;
      animation-delay: ${Math.random() * 0.5}s;
    `;
    container.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}
 
// ── NETWORK ───────────────────────────────────
async function registerPlay(userId) {
  try {
    await fetch(PROMO_WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, action: 'mark_played' })
    });
    userData.Promo_Drapeau_Joue = true;
    localStorage.setItem('user', JSON.stringify(userData));
  } catch(e) { console.error(e); }
}
 
async function claimWin(amount) {
  if (!amount || amount <= 0) return;
  try {
    const res = await fetch(PROMO_WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: userData.userId || userData.NumeroCarte, action: 'claim_prize', amount })
    });
    const data = await res.json();
    if (data.nouveauSolde !== undefined) {
      userData.Solde = data.nouveauSolde;
      localStorage.setItem('user', JSON.stringify(userData));
    }
  } catch(e) { console.error(e); }
}
 
async function activateUS() {
  const btn = document.querySelector('.btn-modal');
  btn.textContent = '⏳ ACTIVATION...';
  btn.disabled = true;
  try {
    const res = await fetch(PROMO_WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: userData.userId || userData.NumeroCarte, action: 'activate_us' })
    });
    const data = await res.json();
    if (res.ok) {
      userData.Compte_US_Actif = true;
      if (data.nouveauSolde !== undefined) userData.Solde = data.nouveauSolde;
      localStorage.setItem('user', JSON.stringify(userData));
      document.getElementById('resultModal').classList.remove('open');
      setTimeout(() => window.location.reload(), 300);
    } else {
      alert("Erreur : " + (data.message || "Fonds insuffisants."));
      btn.textContent = '🌍 ACTIVER MON COMPTE USD (200G)';
      btn.disabled = false;
    }
  } catch(e) {
    alert("Connexion impossible. Vérifiez votre internet.");
    btn.textContent = '🌍 ACTIVER MON COMPTE USD (200G)';
    btn.disabled = false;
  }
}
</script>
