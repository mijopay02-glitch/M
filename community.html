<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Le Cercle — MIJOPAY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper:       #F3F0E8;
      --surface:     #FFFFFF;
      --ink:         #14181F;
      --ink-soft:    #6B7280;
      --line:        rgba(20, 24, 31, 0.09);
      --line-strong: rgba(20, 24, 31, 0.16);

      --acc-blue:    #2451D6;
      --acc-blue-bg: rgba(36, 81, 214, 0.09);
      --acc-teal:    #1B7A63;
      --acc-teal-bg: rgba(27, 122, 99, 0.10);
      --acc-wine:    #9C3B4C;
      --acc-wine-bg: rgba(156, 59, 76, 0.10);
      --acc-rust:    #B5651D;
      --acc-rust-bg: rgba(181, 101, 29, 0.10);

      /* Identité du sceau officiel MIJO — navy + or, distincte de la palette des membres */
      --seal-ink:      #1B2135;
      --seal-ink-2:    #262E48;
      --seal-gold:     #D4AF3D;
      --seal-gold-ink: #8A6A16;
      --seal-gold-bg:  rgba(212, 175, 61, 0.13);

      --radius-sm:  8px;
      --radius-md:  16px;
      --radius-lg:  22px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      background-image:
        radial-gradient(circle at 12% 0%, rgba(36,81,214,0.05), transparent 40%),
        radial-gradient(circle at 100% 20%, rgba(212,175,61,0.05), transparent 35%);
      font-family: 'Space Grotesk', sans-serif;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── SIGNATURE : anneaux concentriques du "Cercle" ──
       Ce motif revient à trois endroits seulement (header, sceau officiel,
       état vide) — jamais en décor gratuit ailleurs. */
    .ring-motif {
      position: absolute;
      border-radius: 50%;
      border: 1px solid currentColor;
      pointer-events: none;
    }

    /* ── HEADER ── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(243, 240, 232, 0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
    }

    .header-rings {
      position: absolute;
      right: -30px; top: 50%;
      transform: translateY(-50%);
      width: 130px; height: 130px;
      color: var(--acc-blue);
      opacity: 0.08;
      animation: rings-spin 60s linear infinite;
    }
    .header-rings .ring-motif:nth-child(1) { inset: 0; }
    .header-rings .ring-motif:nth-child(2) { inset: 22px; }
    .header-rings .ring-motif:nth-child(3) { inset: 44px; }
    @keyframes rings-spin { to { transform: translateY(-50%) rotate(360deg); } }

    .header-title {
      font-family: 'Fraunces', serif;
      font-optical-sizing: auto;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      position: relative;
    }

    .header-title::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: -4px;
      height: 2px;
      background: linear-gradient(90deg, var(--seal-gold), var(--acc-blue), transparent);
      background-size: 200% 100%;
      animation: header-shimmer 5s ease-in-out infinite;
    }

    @keyframes header-shimmer {
      0%, 100% { background-position: 0% 0; }
      50% { background-position: 100% 0; }
    }

    .header-subtitle {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 1.6px;
      margin-top: 3px;
      display: block;
    }

    .back-btn {
      text-decoration: none;
      color: var(--ink);
      font-weight: 600;
      font-size: 19px;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.15s;
      position: relative;
      z-index: 1;
    }
    .back-btn:hover { background: var(--line); transform: translateX(-2px); }

    /* ── RANG DES MEMBRES ACTIFS ── */
    .members-section {
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
      padding: 16px 16px 2px;
    }
    .members-section:has(.members-rail.empty) { display: none; }

    .rail-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 10px;
      padding-left: 2px;
    }

    .members-rail {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .members-rail::-webkit-scrollbar { display: none; }

    .member-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      width: 56px;
      animation: chip-in 0.4s ease both;
    }

    @keyframes chip-in {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    .member-ring {
      width: 46px; height: 46px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 15px;
      background: var(--surface);
      position: relative;
      transition: transform 0.2s ease;
      cursor: default;
    }
    .member-chip:hover .member-ring { transform: scale(1.1) rotate(-4deg); }
    .member-ring::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      padding: 2px;
      background: conic-gradient(var(--ring-color) 0 100%);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.85;
    }

    /* Médaillon officiel — deux anneaux + fond navy, jamais confondu avec un membre */
    .member-ring.is-official {
      background: linear-gradient(160deg, var(--seal-ink), var(--seal-ink-2));
      color: var(--seal-gold);
    }
    .member-ring.is-official::before {
      background: none;
      border: 1.5px solid var(--seal-gold);
      opacity: 1;
    }
    .member-ring.is-official::after {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid var(--seal-gold);
      opacity: 0.5;
    }

    .member-name {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--ink-soft);
      max-width: 56px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .member-name.is-official { color: var(--seal-gold-ink); font-weight: 700; }

    /* ── FEED ── */
    .feed-container {
      flex: 1;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
      padding: 12px 16px 130px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .state-msg {
      position: relative;
      text-align: center;
      padding: 64px 20px;
      color: var(--ink-soft);
      font-size: 13.5px;
      line-height: 1.6;
      animation: rise 0.4s ease both;
    }
    .state-msg::before,
    .state-msg::after {
      content: "";
      position: absolute;
      left: 50%; top: 26px;
      transform: translateX(-50%);
      border-radius: 50%;
      border: 1px solid var(--acc-blue);
      opacity: 0.12;
    }
    .state-msg::before { width: 90px; height: 90px; }
    .state-msg::after  { width: 58px; height: 58px; top: 42px; }
    .state-msg .state-title {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--ink);
      display: block;
      margin-bottom: 6px;
    }
    .retry-btn {
      margin-top: 14px;
      background: var(--ink);
      color: var(--surface);
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 18px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 12.5px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .retry-btn:hover { background: var(--acc-blue); }
    .retry-btn:active { transform: scale(0.96); }

    /* ── POST CARD ── */
    .post-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 18px 18px 16px;
      box-shadow: 0 1px 2px rgba(20,24,31,0.03), 0 8px 24px rgba(20,24,31,0.03);
      animation: rise 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      position: relative;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .post-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--card-accent, var(--acc-blue));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s ease;
    }

    .post-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 4px 10px rgba(20,24,31,0.05), 0 16px 32px rgba(20,24,31,0.07);
      border-color: var(--line-strong);
    }
    .post-card:hover::before { transform: scaleX(1); }

    /* ── Message officiel MIJO : traité comme une lettre à en-tête, pas un post coloré ── */
    .post-card.is-official {
      border-color: rgba(212,175,61,0.45);
      background: var(--surface);
      padding-top: 46px;
      box-shadow: 0 1px 2px rgba(27,33,53,0.06), 0 10px 28px rgba(27,33,53,0.08);
    }
    .post-card.is-official:hover {
      box-shadow: 0 4px 12px rgba(27,33,53,0.10), 0 18px 36px rgba(27,33,53,0.13);
    }
    .post-card.is-official::before { display: none; }

    /* Bandeau d'en-tête navy avec micro-motif d'anneaux, comme un papier à lettre officiel */
    .post-card.is-official::after {
      content: "LE CERCLE · COMMUNIQUÉ OFFICIEL";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 14px 15px, rgba(212,175,61,0.18) 0 5px, transparent 6px),
        radial-gradient(circle at 92% 50%, rgba(212,175,61,0.14) 0 9px, transparent 10px),
        linear-gradient(120deg, var(--seal-ink), var(--seal-ink-2));
      color: var(--seal-gold);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2.2px;
    }

    .official-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: var(--seal-ink);
      color: var(--seal-gold);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 20px;
      letter-spacing: 0.3px;
      margin-left: 7px;
      vertical-align: middle;
      white-space: nowrap;
      border: 1px solid rgba(212,175,61,0.5);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 12px;
    }

    .author-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 14px;
      flex-shrink: 0;
      border: 1.5px solid var(--avatar-color, var(--acc-blue));
      background: var(--avatar-bg, var(--acc-blue-bg));
      color: var(--avatar-color, var(--acc-blue));
      position: relative;
    }

    /* Avatar officiel = petit médaillon-sceau (navy + or, double anneau) */
    .author-avatar.is-official {
      background: linear-gradient(160deg, var(--seal-ink), var(--seal-ink-2));
      color: var(--seal-gold);
      border: 1.5px solid var(--seal-gold);
      box-shadow: 0 0 0 3px var(--seal-gold-bg), 0 0 0 4.5px rgba(212,175,61,0.28);
    }

    .author-meta { display: flex; flex-direction: column; min-width: 0; }

    .author-name {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 14.5px;
      color: var(--ink);
      letter-spacing: -0.1px;
    }
    .author-name.is-official { color: var(--seal-gold-ink); }

    .post-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--ink-soft);
      letter-spacing: 0.2px;
    }

    .post-content {
      font-size: 14.5px;
      line-height: 1.65;
      color: var(--ink);
      margin-bottom: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── ACTIONS ── */
    .post-actions {
      display: flex;
      gap: 6px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
      margin-top: 2px;
    }

    .action-btn {
      background: transparent;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink-soft);
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      transition: background 0.15s, color 0.15s, transform 0.1s;
      position: relative;
    }
    .action-btn:hover { background: var(--paper); color: var(--ink); }
    .action-btn:active { transform: scale(0.94); }
    .action-btn.liked { color: var(--acc-blue); background: var(--acc-blue-bg); }
    .action-btn.liked:hover { background: var(--acc-blue-bg); }

    .action-icon { font-size: 14px; line-height: 1; display: inline-block; }

    @keyframes like-pop {
      0%   { transform: scale(1) rotate(0); }
      30%  { transform: scale(1.5) rotate(-12deg); }
      55%  { transform: scale(0.85) rotate(6deg); }
      100% { transform: scale(1) rotate(0); }
    }
    .action-icon.pop { animation: like-pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1); }

    /* Particules du like — un petit éclat au clic */
    .like-particle {
      position: fixed;
      width: 5px; height: 5px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 999;
      animation: particle-fly 0.6s ease-out forwards;
    }
    @keyframes particle-fly {
      0%   { transform: translate(0, 0) scale(1);   opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
    }

    /* ── RÉPONSES : le fil du cercle ── */
    .replies-container {
      margin-top: 14px;
      padding-left: 22px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .replies-container::before {
      content: "";
      position: absolute;
      left: 8px; top: 4px; bottom: 12px;
      width: 1.5px;
      background: var(--line-strong);
      border-radius: 2px;
    }

    .reply-item { position: relative; animation: rise 0.4s ease both; }
    .reply-item::before {
      content: "";
      position: absolute;
      left: -14px; top: 16px;
      width: 12px; height: 1.5px;
      background: var(--line-strong);
    }

    .reply-item .author-avatar { width: 28px; height: 28px; font-size: 11px; border-width: 1px; }
    .reply-item .author-avatar.is-official { border-width: 1.5px; box-shadow: 0 0 0 2px var(--seal-gold-bg); }
    .reply-item .author-name { font-size: 13px; }
    .reply-item .post-content { font-size: 13.5px; margin-bottom: 0; }
    .reply-item .post-header { margin-bottom: 6px; }
    .reply-item.is-official-reply {
      background: linear-gradient(120deg, var(--seal-gold-bg), rgba(212,175,61,0.04));
      border: 1px solid rgba(212,175,61,0.25);
      border-radius: 12px;
      padding: 9px 11px;
      margin-left: -10px;
    }
    .reply-item .official-badge { font-size: 8.5px; padding: 1px 6px; }

    /* ── COMPOSER ── */
    .composer-wrapper {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(243, 240, 232, 0.94);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--line);
      padding: 12px 16px 22px;
    }

    .composer-inner {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .reply-banner {
      display: none;
      font-size: 12px;
      color: var(--acc-blue);
      font-weight: 600;
      margin-bottom: 8px;
      justify-content: space-between;
      align-items: center;
      background: var(--acc-blue-bg);
      padding: 7px 12px;
      border-radius: 10px;
      animation: rise 0.25s ease both;
    }
    .reply-banner.active { display: flex; }
    .cancel-reply {
      cursor: pointer; color: var(--acc-blue); font-size: 17px; line-height: 1;
      opacity: 0.7;
      transition: opacity 0.15s, transform 0.15s;
    }
    .cancel-reply:hover { opacity: 1; transform: rotate(90deg); }

    .composer-row {
      display: flex; gap: 10px; align-items: flex-end; width: 100%;
    }

    .composer-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--line);
      border-radius: var(--radius-md);
      padding: 13px 15px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14.5px;
      color: var(--ink);
      resize: none;
      min-height: 48px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .composer-input:focus {
      border-color: var(--acc-blue);
      box-shadow: 0 0 0 3px var(--acc-blue-bg);
    }
    .composer-input::placeholder { color: #9AA1AC; }

    .publish-btn {
      background: var(--ink);
      color: var(--surface);
      border: none;
      border-radius: var(--radius-sm);
      height: 48px;
      padding: 0 20px;
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.25s, transform 0.1s;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .publish-btn::before {
      content: "";
      position: absolute;
      top: 0; left: -60%;
      width: 40%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
      transform: skewX(-20deg);
      transition: left 0.5s ease;
    }
    .publish-btn:hover { background: var(--acc-blue); }
    .publish-btn:hover::before { left: 130%; }
    .publish-btn:active { transform: scale(0.96); }
    .publish-btn:disabled { background: var(--ink-soft); cursor: not-allowed; opacity: 0.5; }
    .publish-btn:disabled::before { display: none; }

    /* Composer en mode "officiel" — reprend l'identité navy + or du sceau */
    .composer-wrapper.is-official-mode {
      border-top-color: rgba(212,175,61,0.35);
    }
    .composer-wrapper.is-official-mode .composer-input {
      border-color: rgba(212,175,61,0.4);
    }
    .composer-wrapper.is-official-mode .composer-input:focus {
      border-color: var(--seal-gold);
      box-shadow: 0 0 0 3px var(--seal-gold-bg);
    }
    .composer-wrapper.is-official-mode .publish-btn {
      background: linear-gradient(135deg, var(--seal-ink), var(--seal-ink-2));
      color: var(--seal-gold);
    }
    .composer-wrapper.is-official-mode .publish-btn:hover { background: var(--seal-ink); }

    @media (prefers-reduced-motion: reduce) {
      .post-card, .reply-item, .member-chip, .state-msg, .reply-banner, .header-rings { animation: none; }
      .header-title::after { animation: none; }
      * { transition: none !important; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <a href="home.html" class="back-btn" aria-label="Retour">←</a>
    <div style="text-align: center; position: relative; z-index: 1;">
      <h1 class="header-title">Communauté</h1>
      <span class="header-subtitle">Réseau d'entrepreneurs</span>
    </div>
    <div style="width: 32px;"></div>
    <div class="header-rings" aria-hidden="true">
      <div class="ring-motif"></div>
      <div class="ring-motif"></div>
      <div class="ring-motif"></div>
    </div>
  </header>

  <!-- Membres actifs -->
  <div class="members-section">
    <div class="rail-eyebrow"> Membres actifs du cercle</div>
    <div class="members-rail" id="membersRail"></div>
  </div>

  <!-- Feed -->
  <main class="feed-container" id="feedContainer"></main>

  <!-- Composer -->
  <div class="composer-wrapper" id="composerWrapper">
    <div class="composer-inner">
      <div class="reply-banner" id="replyBanner">
        <span id="replyingToText">En réponse à...</span>
        <span class="cancel-reply" id="cancelReplyBtn">×</span>
      </div>
      <div class="composer-row">
        <textarea id="composerInput" class="composer-input" placeholder="Partagez une stratégie ou posez une question..." rows="1"></textarea>
        <button id="publishBtn" class="publish-btn">Publier</button>
      </div>
    </div>
  </div>

  <script>
    // ── CONFIGURATION CLOUDFLARE ──
    const API_BASE_URL = "https://reseau.mijocomplexe.workers.dev/api";

    // ── COMPTES OFFICIELS MIJO (entreprise + PDG) ──
    // Un post est reconnu comme "officiel" si le userId OU le nom d'affichage
    // correspond à l'un des comptes de cette liste. On peut en ajouter d'autres
    // plus tard (ex: un futur associé) en complétant simplement ce tableau.
    //
    // IMPORTANT : si le badge n'apparaît toujours pas après ce correctif,
    // ouvre la Console du navigateur (F12) — un message
    // "[MIJO] Post non reconnu comme officiel — id: ... | nom: ..."
    // t'indiquera exactement le userId et le nom que le Worker renvoie,
    // pour que tu puisses corriger l'id ci-dessous si besoin (probable
    // depuis la migration vers Supabase, où les anciens id Airtable "rec..."
    // ne correspondent peut-être plus au userId réellement stocké).
    const MIJO_OFFICIAL_ACCOUNTS = [
      {
        id: "rec6v8Z0K0G4bwbdE",
        name: "mijo complexe",
        railLabel: "MIJO",
        badgeFull: "✓ MIJO Officiel",
        badgeShort: "✓ MIJO"
      },
      {
        id: "recfcTPvpeweReklm",
        name: "mikyson antoine",
        railLabel: "Mikyson",
        badgeFull: "✓ PDG MIJO",
        badgeShort: "✓ PDG"
      }
    ];

    // Normalise une chaîne pour une comparaison fiable : enlève les accents,
    // les espaces multiples, les espaces de début/fin, et met en minuscules.
    // Ça évite qu'un simple accent ("Mikyson Antoïne" vs "mikyson antoine")
    // ou un double espace empêche la reconnaissance d'un compte officiel.
    function normalize(str) {
      return String(str ?? '')
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .trim()
        .toLowerCase()
        .replace(/\s+/g, ' ');
    }

    // Retourne la fiche du compte officiel correspondant (ou null si le post
    // vient d'un membre normal du Cercle).
    function getOfficialAccount(item) {
      if (!item) return null;
      const id = item.userId || item.user_id || item.authorId
              || (item.author && (item.author.id || item.author.userId)) || '';
      const rawName = (item.author && item.author.name) || item.authorName || '';
      const normId = normalize(id);
      const normName = normalize(rawName);

      const match = MIJO_OFFICIAL_ACCOUNTS.find(acc =>
        (normId && normalize(acc.id) === normId) || normalize(acc.name) === normName
      );

      if (!match) {
        // Aide au débogage — regarde la console (F12) si un badge manque.
        console.debug('[MIJO] Post non reconnu comme officiel — id:', id || '(vide)', '| nom:', rawName || '(vide)');
      }

      return match || null;
    }

    function isOfficialPost(item) {
      return !!getOfficialAccount(item);
    }

    // ── SÉCURITÉ : tout texte affiché passe par ici avant d'aller dans le HTML ──
    function escapeHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    // ── COULEURS DU CERCLE ──
    // Chaque membre garde toujours la même teinte, d'une session à l'autre.
    // Les comptes officiels (voir MIJO_OFFICIAL_ACCOUNTS) utilisent toujours
    // leur propre traitement navy + or (voir CSS .is-official) — jamais
    // confondu avec un membre normal.
    const CERCLE_COLORS = [
      { name: 'blue', hex: '#2451D6', bg: 'rgba(36, 81, 214, 0.09)' },
      { name: 'teal', hex: '#1B7A63', bg: 'rgba(27, 122, 99, 0.10)' },
      { name: 'wine', hex: '#9C3B4C', bg: 'rgba(156, 59, 76, 0.10)' },
      { name: 'rust', hex: '#B5651D', bg: 'rgba(181, 101, 29, 0.10)' },
    ];

    function colorFor(nameOrId) {
      const str = String(nameOrId || 'anon');
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = (hash * 31 + str.charCodeAt(i)) >>> 0;
      return CERCLE_COLORS[hash % CERCLE_COLORS.length];
    }

    // 1. IDENTIFICATION UTILISATEUR (Depuis LocalStorage)
    let currentUser = { id: "anonymous", name: "Anonyme", initials: "AN" };

    function initUser() {
      try {
        const storedUser = JSON.parse(localStorage.getItem("user"));
        if (storedUser) {
          const fullName = storedUser.name || storedUser.NomUtilisateur || "Utilisateur MIJO";
          const initials = fullName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();

          currentUser = {
            id: storedUser.userId || storedUser.telephone || Date.now().toString(),
            name: fullName,
            initials: initials
          };
        }
      } catch (e) {
        console.error("Erreur lecture utilisateur:", e);
      }

      // Si un compte officiel (entreprise ou PDG) est connecté, on marque le
      // composer en mode "officiel" — juste un repère visuel discret pour toi,
      // pas affiché aux autres.
      const myOfficialAccount = MIJO_OFFICIAL_ACCOUNTS.find(acc =>
        normalize(acc.id) === normalize(currentUser.id) || normalize(acc.name) === normalize(currentUser.name)
      );
      if (myOfficialAccount) {
        document.getElementById('composerWrapper').classList.add('is-official-mode');
      } else {
        // Debug : aide à voir pourquoi le compte connecté n'est pas reconnu comme officiel
        console.debug('[MIJO] Utilisateur connecté non reconnu comme officiel — id:', currentUser.id, '| nom:', currentUser.name);
      }
    }

    // 2. ÉTAT DU CERCLE
    let replyingToId = null;
    let postsData = [];

    // 3. FETCH : RÉCUPÉRER LES DONNÉES DEPUIS CLOUDFLARE
    async function chargerFeed(smoothScroll) {
      const container = document.getElementById('feedContainer');
      container.innerHTML = `<div class="state-msg"><span class="state-title">Chargement du Cercle…</span>On rassemble les dernières idées.</div>`;

      try {
        const response = await fetch(`${API_BASE_URL}/posts`);
        if (!response.ok) throw new Error("Erreur serveur");

        postsData = await response.json();

        // Le fil doit se lire comme WhatsApp : le plus ancien en haut, le
        // plus récent en bas. Si le Worker renvoie déjà les messages du plus
        // ancien au plus récent, cette étape ne change rien. S'il renvoie
        // le plus récent en premier (ex: "ORDER BY created_at DESC" côté
        // Supabase), on inverse ici pour garantir le bon ordre visuel.
        //
        // Si après ce correctif l'ordre est encore inversé, retire simplement
        // la ligne ci-dessous (le Worker envoie déjà le bon ordre) :
        postsData.reverse();

        if (postsData.length === 0) {
          container.innerHTML = `<div class="state-msg"><span class="state-title">Le Cercle est encore silencieux</span>Soyez le premier à partager une stratégie ou une question.</div>`;
          document.getElementById('membersRail').innerHTML = '';
          document.getElementById('membersRail').classList.add('empty');
        } else {
          renderMembersRail();
          renderFeed();
          // Style WhatsApp : les messages les plus anciens sont en haut, les plus
          // récents en bas. On ouvre directement sur les derniers messages, et on
          // remonte (glisser vers le haut) pour retrouver l'historique.
          scrollToLatest(smoothScroll);
        }
      } catch (error) {
        console.error("Erreur lors du chargement:", error);
        container.innerHTML = `<div class="state-msg"><span class="state-title">Connexion au Cercle impossible</span>Vérifiez votre réseau, puis réessayez.<br><button class="retry-btn" id="retryBtn">Réessayer</button></div>`;
        document.getElementById('retryBtn').addEventListener('click', () => chargerFeed(false));
      }
    }

    // Faire défiler jusqu'au dernier message (comportement WhatsApp : la vue s'ouvre en bas,
    // on remonte manuellement pour voir les messages plus anciens)
    function scrollToLatest(smooth) {
      requestAnimationFrame(() => {
        window.scrollTo({
          top: document.documentElement.scrollHeight,
          behavior: smooth ? 'smooth' : 'auto'
        });
      });
    }

    // 4. RANG DES MEMBRES ACTIFS
    function renderMembersRail() {
      const rail = document.getElementById('membersRail');
      const seen = new Map();
      postsData.forEach(post => {
        if (!seen.has(post.author.name)) {
          seen.set(post.author.name, { author: post.author, officialAccount: getOfficialAccount(post) });
        }
      });

      if (seen.size === 0) { rail.innerHTML = ''; rail.classList.add('empty'); return; }
      rail.classList.remove('empty');

      let html = '';
      let i = 0;
      seen.forEach((entry, name) => {
        const author = entry.author;
        const officialAccount = entry.officialAccount;
        const official = !!officialAccount;
        const c = official ? null : colorFor(name);
        const safeInitials = escapeHtml(author.initials);
        const safeFirstName = escapeHtml(official ? officialAccount.railLabel : name.split(' ')[0]);
        html += `
          <div class="member-chip" style="animation-delay:${i * 0.04}s">
            <div class="member-ring ${official ? 'is-official' : ''}" style="${official ? '' : `--ring-color:${c.hex}; color:${c.hex};`}">${safeInitials}</div>
            <span class="member-name ${official ? 'is-official' : ''}">${safeFirstName}</span>
          </div>
        `;
        i++;
      });
      rail.innerHTML = html;
    }

    // 5. LOGIQUE D'AFFICHAGE
    function renderFeed() {
      const container = document.getElementById('feedContainer');
      container.innerHTML = '';

      postsData.forEach((post, index) => {
        const isLikedByMe = post.likedBy && post.likedBy.includes(currentUser.id);
        const officialAccount = getOfficialAccount(post);
        const official = !!officialAccount;
        const c = official ? null : colorFor(post.author.name);

        const safeName = escapeHtml(post.author.name);
        const safeInitials = escapeHtml(post.author.initials);
        const safeContent = escapeHtml(post.content);
        const safeTime = escapeHtml(post.timestamp);
        const safeId = escapeHtml(post.id);
        const badgeHtml = official ? `<span class="official-badge">${escapeHtml(officialAccount.badgeFull)}</span>` : '';

        const postHTML = `
          <article class="post-card ${official ? 'is-official' : ''}" id="${safeId}" style="${official ? '' : `--card-accent:${c.hex};`} animation-delay:${Math.min(index, 8) * 0.06}s">
            <div class="post-header">
              <div class="author-avatar ${official ? 'is-official' : ''}" style="${official ? '' : `--avatar-color:${c.hex}; --avatar-bg:${c.bg};`}">${safeInitials}</div>
              <div class="author-meta">
                <span class="author-name ${official ? 'is-official' : ''}">${safeName}${badgeHtml}</span>
                <span class="post-time">${safeTime}</span>
              </div>
            </div>

            <div class="post-content">${safeContent}</div>

            <div class="post-actions">
              <button class="action-btn like-btn ${isLikedByMe ? 'liked' : ''}" data-post-id="${safeId}">
                <span class="action-icon">↑</span> <span class="like-count">${post.likes}</span> Utile
              </button>
              <button class="action-btn reply-btn" data-post-id="${safeId}" data-author-name="${safeName}">
                <span class="action-icon">↩</span> Répondre
              </button>
            </div>

            ${renderReplies(post.replies)}
          </article>
        `;
        container.insertAdjacentHTML('beforeend', postHTML);
      });
    }

    function renderReplies(replies) {
      if (!replies || replies.length === 0) return '';
      let repliesHTML = '<div class="replies-container">';
      replies.forEach(reply => {
        const officialAccount = getOfficialAccount(reply);
        const official = !!officialAccount;
        const c = official ? null : colorFor(reply.author.name);
        const safeName = escapeHtml(reply.author.name);
        const safeInitials = escapeHtml(reply.author.initials);
        const safeContent = escapeHtml(reply.content);
        const safeTime = escapeHtml(reply.timestamp);
        const safeId = escapeHtml(reply.id);
        const badgeHtml = official ? `<span class="official-badge">${escapeHtml(officialAccount.badgeShort)}</span>` : '';
        repliesHTML += `
          <div class="reply-item ${official ? 'is-official-reply' : ''}" id="${safeId}">
            <div class="post-header">
              <div class="author-avatar ${official ? 'is-official' : ''}" style="${official ? '' : `--avatar-color:${c.hex}; --avatar-bg:${c.bg};`}">${safeInitials}</div>
              <div class="author-meta">
                <span class="author-name ${official ? 'is-official' : ''}">${safeName}${badgeHtml}</span>
                <span class="post-time">${safeTime}</span>
              </div>
            </div>
            <div class="post-content">${safeContent}</div>
          </div>
        `;
      });
      repliesHTML += '</div>';
      return repliesHTML;
    }

    // 6. POST : PUBLIER UN MESSAGE (Vers Cloudflare)
    async function publishMessage() {
      const input = document.getElementById('composerInput');
      const btn = document.getElementById('publishBtn');
      const content = input.value.trim();

      if (!content) return;

      btn.disabled = true;
      btn.textContent = '...';

      const payload = {
        userId: currentUser.id,
        authorName: currentUser.name,
        authorInitials: currentUser.initials,
        content: content,
        parentId: replyingToId
      };

      try {
        const response = await fetch(`${API_BASE_URL}/posts`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error("Erreur publication");

        input.value = '';
        input.style.height = '50px';
        cancelReply();
        await chargerFeed(true); // scroll fluide vers le nouveau message après envoi

      } catch (error) {
        alert("Impossible de publier pour le moment. Réessayez dans un instant.");
        console.error(error);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Publier';
      }
    }

    // 7. POST : LIKER UN MESSAGE (Vers Cloudflare)
    async function toggleLike(event, postId) {
      const post = postsData.find(p => p.id === postId);
      if (!post) return;

      const button = event.currentTarget;
      const wasLiked = post.likedBy && post.likedBy.includes(currentUser.id);

      if (wasLiked) {
        post.likes -= 1;
        post.likedBy = post.likedBy.filter(id => id !== currentUser.id);
      } else {
        post.likes += 1;
        if (!post.likedBy) post.likedBy = [];
        post.likedBy.push(currentUser.id);
        burstParticles(button);
      }
      renderFeed();

      // Rejoue la petite animation sur l'icône du bouton qui vient d'être recréé
      const freshBtn = document.querySelector(`.like-btn[data-post-id="${CSS.escape(postId)}"]`);
      if (freshBtn) {
        const icon = freshBtn.querySelector('.action-icon');
        icon.classList.add('pop');
        icon.addEventListener('animationend', () => icon.classList.remove('pop'), { once: true });
      }

      try {
        await fetch(`${API_BASE_URL}/likes`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: currentUser.id,
            postId: postId
          })
        });
      } catch (error) {
        console.error("Erreur lors de l'enregistrement du like", error);
      }
    }

    // Petit éclat de particules colorées au moment du like
    function burstParticles(button) {
      const rect = button.getBoundingClientRect();
      const colors = [CERCLE_COLORS[0].hex, CERCLE_COLORS[1].hex, CERCLE_COLORS[2].hex, CERCLE_COLORS[3].hex];
      const originX = rect.left + rect.height * 0.6;
      const originY = rect.top + rect.height * 0.5;

      for (let i = 0; i < 8; i++) {
        const p = document.createElement('span');
        p.className = 'like-particle';
        const angle = (Math.PI * 2 * i) / 8 - Math.PI / 2 + (Math.random() * 0.5 - 0.25);
        const dist = 20 + Math.random() * 18;
        p.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
        p.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
        p.style.background = colors[i % colors.length];
        p.style.left = `${originX}px`;
        p.style.top = `${originY}px`;
        document.body.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }
    }

    // Gérer la boîte de réponse
    function prepareReply(postId, authorName) {
      replyingToId = postId;
      document.getElementById('replyingToText').textContent = `En réponse à ${authorName}...`;
      document.getElementById('replyBanner').classList.add('active');
      document.getElementById('composerInput').focus();
    }

    function cancelReply() {
      replyingToId = null;
      document.getElementById('replyBanner').classList.remove('active');
    }

    function autoGrow(element) {
      element.style.height = "5px";
      element.style.height = (element.scrollHeight) + "px";
    }

    // ── ÉCOUTEURS D'ÉVÉNEMENTS (délégation — aucune donnée utilisateur dans un attribut onclick) ──
    document.getElementById('composerInput').addEventListener('input', function () { autoGrow(this); });
    document.getElementById('publishBtn').addEventListener('click', publishMessage);
    document.getElementById('cancelReplyBtn').addEventListener('click', cancelReply);

    document.getElementById('feedContainer').addEventListener('click', (e) => {
      const likeBtn = e.target.closest('.like-btn');
      if (likeBtn) { toggleLike(e, likeBtn.dataset.postId); return; }

      const replyBtn = e.target.closest('.reply-btn');
      if (replyBtn) { prepareReply(replyBtn.dataset.postId, replyBtn.dataset.authorName); return; }
    });

    document.addEventListener('DOMContentLoaded', () => {
      initUser();
      chargerFeed(false); // premier chargement : on arrive directement en bas, comme WhatsApp
    });
  </script>
</body>
</html>
