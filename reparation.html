<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Space+Grotesk:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#06010f;font-family:'Space Grotesk',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
 
#bg{position:fixed;inset:0;z-index:0}
 
/* Glass card */
.glass{
  position:relative;z-index:5;
  background:rgba(255,255,255,.03);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;
  padding:2.4rem 2.8rem 2rem;
  width:90%;max-width:520px;
  box-shadow:0 0 60px rgba(124,58,237,.08),inset 0 1px 0 rgba(255,255,255,.06);
  display:flex;flex-direction:column;align-items:center;text-align:center;gap:0;
}
 
canvas#scene{width:300px;height:190px;margin-bottom:1.1rem;border-radius:12px}
 
/* Badge */
.badge{
  font-size:9.5px;letter-spacing:.3em;text-transform:uppercase;
  color:#a78bfa;border:1px solid rgba(167,139,250,.28);
  padding:5px 16px;border-radius:100px;margin-bottom:1rem;
  animation:stagger 1s cubic-bezier(.16,1,.3,1) .08s both;
}
 
/* Title */
h1{
  font-family:'Playfair Display',serif;font-weight:400;
  font-size:clamp(2.2rem,4.5vw,3.2rem);line-height:1.08;color:#fff;
  margin-bottom:.8rem;
  animation:stagger 1s cubic-bezier(.16,1,.3,1) .18s both;
}
h1 span{
  font-style:italic;
  background:linear-gradient(90deg,#a78bfa,#38bdf8,#34d399,#a78bfa);
  background-size:300% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 4s linear infinite;
}
@keyframes shimmer{0%{background-position:0% 50%}100%{background-position:300% 50%}}
 
/* Desc */
.desc{
  font-size:.88rem;font-weight:300;color:rgba(255,255,255,.42);line-height:1.8;
  max-width:340px;margin:0 auto 1.6rem;
  animation:stagger 1s cubic-bezier(.16,1,.3,1) .28s both;
}
 
/* Tasks */
.tasks{width:100%;display:flex;flex-direction:column;gap:.65rem;margin-bottom:1.6rem}
.task{display:flex;align-items:center;gap:10px;opacity:0;animation:stagger 1s cubic-bezier(.16,1,.3,1) both}
.task:nth-child(1){animation-delay:.38s}
.task:nth-child(2){animation-delay:.48s}
.task:nth-child(3){animation-delay:.58s}
 
.task-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .6s,box-shadow .6s}
.task-dot.done{background:#34d399;box-shadow:0 0 8px #34d399}
.task-dot.active{background:#a78bfa;box-shadow:0 0 8px #a78bfa;animation:dpulse 1.5s ease-in-out infinite}
.task-dot.wait{background:rgba(255,255,255,.18)}
@keyframes dpulse{0%,100%{box-shadow:0 0 0 0 rgba(167,139,250,.5)}50%{box-shadow:0 0 0 7px rgba(167,139,250,0)}}
 
.task-label{font-size:11.5px;letter-spacing:.03em;flex:0 0 152px;text-align:left;transition:color .6s}
.task-label.done{color:#34d399}
.task-label.active{color:#a78bfa}
.task-label.wait{color:rgba(255,255,255,.25)}
 
.task-pct{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:rgba(255,255,255,.3);min-width:34px;text-align:right;
  transition:color .6s;
}
.task-pct.done{color:#34d399}
.task-pct.active{color:#a78bfa}
 
.task-track{flex:1;height:2px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.task-fill{height:100%;border-radius:2px;width:0;transition:width .4s ease}
.task-fill.done{background:#34d399;box-shadow:0 0 6px #34d399}
.task-fill.active{background:linear-gradient(90deg,#7c3aed,#a78bfa)}
.task-fill.wait{background:rgba(255,255,255,.15)}
 
/* Status */
.status{
  display:flex;align-items:center;gap:8px;
  font-size:10.5px;letter-spacing:.07em;color:rgba(255,255,255,.3);
  animation:stagger 1s cubic-bezier(.16,1,.3,1) .68s both;
}
.live-dot{width:6px;height:6px;border-radius:50%;background:#34d399;position:relative}
.live-dot::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:rgba(52,211,153,.2);animation:lpulse 2s ease-out infinite}
@keyframes lpulse{0%{transform:scale(.7);opacity:1}100%{transform:scale(2.2);opacity:0}}
 
@keyframes stagger{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
 
<canvas id="bg"></canvas>
 
<div class="glass">
  <canvas id="scene" width="600" height="380"></canvas>
 
  <div class="badge">Travaux en cours</div>
 
  <h1>Site en <span>réparation</span></h1>
  <p class="desc">Notre équipe travaille d'arrache-pied. Nous serons de retour très bientôt avec quelque chose de meilleur.</p>
 
  <div class="tasks">
    <div class="task" id="t0">
      <div class="task-dot done" id="d0"></div>
      <div class="task-label done" id="l0">Sauvegarde complète</div>
      <div class="task-track"><div class="task-fill done" id="f0" style="width:100%"></div></div>
      <div class="task-pct done" id="p0">100%</div>
    </div>
    <div class="task" id="t1">
      <div class="task-dot active" id="d1"></div>
      <div class="task-label active" id="l1">Mise à jour système</div>
      <div class="task-track"><div class="task-fill active" id="f1"></div></div>
      <div class="task-pct active" id="p1">0%</div>
    </div>
    <div class="task" id="t2">
      <div class="task-dot wait" id="d2"></div>
      <div class="task-label wait" id="l2">Tests &amp; vérifications</div>
      <div class="task-track"><div class="task-fill wait" id="f2"></div></div>
      <div class="task-pct" id="p2">—</div>
    </div>
  </div>
 
  <div class="status"><div class="live-dot"></div><span>Maintenance planifiée — retour imminent</span></div>
</div>
 
<script>
/* ══════════════════════════════════════════
   BACKGROUND  — aurora + stars + shooting
══════════════════════════════════════════ */
(function(){
  const cv=document.getElementById('bg'),cx=cv.getContext('2d');
  let W,H,t=0,mouse={x:.5,y:.5};
  const stars=[];
 
  function resize(){
    W=cv.width=innerWidth;H=cv.height=innerHeight;
    stars.length=0;
    for(let i=0;i<160;i++) stars.push({
      x:Math.random()*W,y:Math.random()*H,
      r:.3+Math.random()*.9,
      vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.18,
      a:Math.random()*Math.PI*2,
      col:['#a78bfa','#38bdf8','#34d399','#f472b6','#fff'][Math.floor(Math.random()*5)],
      shoot:false,trail:[]
    });
  }
  resize();window.addEventListener('resize',resize);
  document.addEventListener('mousemove',e=>{mouse.x=e.clientX/W;mouse.y=e.clientY/H});
 
  function aurora(){
    /* 3 blobs with parallax offset */
    const ox=(mouse.x-.5)*60,oy=(mouse.y-.5)*40;
    [[W*.25+ox,H*.38+oy,'rgba(124,58,237,.16)',W*.42],
     [W*.74-ox,H*.32-oy,'rgba(56,189,248,.13)',W*.36],
     [W*.5+ox*.4,H*.68-oy*.4,'rgba(52,211,153,.10)',W*.3]].forEach(([ax,ay,col,r])=>{
      const g=cx.createRadialGradient(ax,ay,0,ax,ay,r);
      g.addColorStop(0,col);g.addColorStop(1,'transparent');
      cx.fillStyle=g;cx.fillRect(0,0,W,H);
    });
  }
 
  function grid(){
    cx.strokeStyle='rgba(255,255,255,.025)';cx.lineWidth=1;
    const s=64;
    for(let x=0;x<W;x+=s){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(let y=0;y<H;y+=s){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
  }
 
  function loop(){
    t+=.014;
    cx.fillStyle='#06010f';cx.fillRect(0,0,W,H);
    grid();aurora();
    /* try spawn shooting star */
    if(Math.random()<.003){
      const s=stars.find(s=>!s.shoot);
      if(s){s.shoot=true;s.x=Math.random()*W*.5;s.y=Math.random()*H*.3;
        s.vx=4+Math.random()*4;s.vy=2+Math.random()*2;s.trail=[];s.life=1;}
    }
    stars.forEach(s=>{
      if(s.shoot){
        s.trail.push({x:s.x,y:s.y});if(s.trail.length>18)s.trail.shift();
        s.x+=s.vx;s.y+=s.vy;s.life-=.025;
        s.trail.forEach((p,i)=>{
          cx.beginPath();cx.arc(p.x,p.y,Math.max(0,1.2*(i/s.trail.length)),0,Math.PI*2);
          cx.fillStyle='rgba(255,255,255,'+(i/s.trail.length*.7)+')';cx.fill();
        });
        if(s.life<=0){s.shoot=false;s.x=Math.random()*W;s.y=Math.random()*H;
          s.vx=(Math.random()-.5)*.18;s.vy=(Math.random()-.5)*.18;}
      } else {
        s.x+=s.vx;s.y+=s.vy;s.a+=.015;
        if(s.x<0)s.x=W;if(s.x>W)s.x=0;if(s.y<0)s.y=H;if(s.y>H)s.y=0;
        cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);
        cx.fillStyle=s.col;cx.globalAlpha=.35+.35*Math.sin(s.a);cx.fill();cx.globalAlpha=1;
      }
    });
    requestAnimationFrame(loop);
  }
  loop();
})();
 
/* ══════════════════════════════════════════
   SCENE — gears + tools + physics sparks
══════════════════════════════════════════ */
(function(){
  const cv=document.getElementById('scene'),cx=cv.getContext('2d');
  const W=600,H=380;
  let t=0,speed=1;
  const sparks=[],bolts=[],rings=[];
 
  /* ── Glow helper ── */
  function glow(col,blur){cx.shadowColor=col;cx.shadowBlur=blur;}
  function noGlow(){cx.shadowBlur=0;}
 
  /* ── Gear ── */
  function gear(x,y,R,r,teeth,angle,fillCol,strokeCol,glowCol,glowStr){
    cx.save();cx.translate(x,y);cx.rotate(angle);
    glow(glowCol,glowStr);
    cx.beginPath();
    for(let i=0;i<teeth;i++){
      const a=i/teeth*Math.PI*2,aw=Math.PI/teeth*.38;
      const ro=R+10;
      cx.lineTo(Math.cos(a-aw)*R,Math.sin(a-aw)*R);
      cx.lineTo(Math.cos(a-aw*.55)*ro,Math.sin(a-aw*.55)*ro);
      cx.lineTo(Math.cos(a+aw*.55)*ro,Math.sin(a+aw*.55)*ro);
      cx.lineTo(Math.cos(a+aw)*R,Math.sin(a+aw)*R);
    }
    cx.closePath();cx.fillStyle=fillCol;cx.fill();
    cx.strokeStyle=strokeCol;cx.lineWidth=2;cx.stroke();
    cx.beginPath();cx.arc(0,0,R,0,Math.PI*2);
    cx.fillStyle=fillCol;cx.fill();cx.strokeStyle=strokeCol;cx.lineWidth=1.5;cx.stroke();
    noGlow();
    for(let i=0;i<5;i++){
      const a=i/5*Math.PI*2;
      cx.beginPath();cx.moveTo(Math.cos(a)*r*1.15,Math.sin(a)*r*1.15);
      cx.lineTo(Math.cos(a)*R*.76,Math.sin(a)*R*.76);
      cx.strokeStyle=strokeCol;cx.lineWidth=5;cx.stroke();
    }
    cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);
    cx.fillStyle='#06010f';cx.fill();cx.strokeStyle=strokeCol;cx.lineWidth=2;cx.stroke();
    cx.beginPath();cx.arc(0,0,r*.35,0,Math.PI*2);cx.fillStyle=strokeCol;cx.fill();
    cx.restore();
  }
 
  /* ── Sparks physics ── */
  const GROUND=355;
  function spawnSpark(x,y,col,n){
    col=col||['#a78bfa','#38bdf8','#fbbf24'][Math.floor(Math.random()*3)];
    for(let i=0;i<(n||4);i++){
      const a=Math.random()*Math.PI*2,s=1.5+Math.random()*3*speed;
      sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:1,col});
    }
  }
 
  function updateSparks(){
    for(let i=sparks.length-1;i>=0;i--){
      const s=sparks[i];
      s.vy+=.08;s.x+=s.vx;s.y+=s.vy;s.life-=.03;
      if(s.y>=GROUND&&s.vy>0){s.vy*=-.38;s.vx*=.75;s.life-=.12;}
      glow(s.col,10);
      cx.beginPath();cx.arc(s.x,s.y,Math.max(0,2.5*s.life),0,Math.PI*2);
      cx.fillStyle=s.col;cx.globalAlpha=s.life;cx.fill();cx.globalAlpha=1;
      noGlow();
      if(s.life<=0)sparks.splice(i,1);
    }
  }
 
  /* ── Electric arc ── */
  function drawArc(x1,y1,x2,y2,col){
    cx.beginPath();cx.moveTo(x1,y1);
    const steps=10;
    for(let i=1;i<steps;i++){
      const f=i/steps;
      cx.lineTo(x1+(x2-x1)*f+(Math.random()-.5)*14,y1+(y2-y1)*f+(Math.random()-.5)*14);
    }
    cx.lineTo(x2,y2);
    glow(col,18);cx.strokeStyle=col;cx.lineWidth=1.5;cx.stroke();noGlow();
  }
 
  /* ── Signal rings ── */
  function signalRing(){
    rings.push({r:6,a:.9});
  }
  let sigTimer=0;
 
  function drawSignal(x,y){
    sigTimer++;if(sigTimer%40===0)signalRing();
    rings.forEach((rg,i)=>{rg.r+=1.1;rg.a-=.022;
      glow('#38bdf8',12);
      cx.beginPath();cx.arc(x,y,rg.r,0,Math.PI*2);
      cx.strokeStyle='#38bdf8';cx.lineWidth=1.5;cx.globalAlpha=Math.max(0,rg.a);cx.stroke();
      cx.globalAlpha=1;noGlow();
    });
    for(let i=rings.length-1;i>=0;i--) if(rings[i].a<=0)rings.splice(i,1);
    glow('#38bdf8',20);cx.beginPath();cx.arc(x,y,5,0,Math.PI*2);cx.fillStyle='#38bdf8';cx.fill();noGlow();
  }
 
  /* ── Wrench (realistic jerk motion) ── */
  let wrenchPhase=0;
  function wrenchAngle(){
    wrenchPhase+=.012*speed;
    const cycle=wrenchPhase%1;
    if(cycle<.35) return -.4+cycle/.35*.5;      /* approach */
    if(cycle<.45) return .1-((cycle-.35)/.1)*.6; /* jerk */
    return -.5+((cycle-.45)/.55)*.1;             /* slow return */
  }
 
  /* ── Hammer (hard hit) ── */
  let hamPhase=0;
  function hammerAngle(){
    hamPhase+=.015*speed;
    const c=hamPhase%1;
    if(c<.15) return -.5+c/.15*.7;
    if(c<.2)  return .2-((c-.15)/.05)*.5;
    if(c<.22){ spawnSpark(450,300,'#fbbf24',3); return -.3; }
    return -.3+((c-.22)/.78)*-.2;
  }
 
  function drawWrench(x,y,ang){
    cx.save();cx.translate(x,y);cx.rotate(ang);
    cx.strokeStyle='#94a3b8';cx.lineWidth=8;cx.lineCap='round';
    cx.beginPath();cx.moveTo(0,0);cx.lineTo(0,52);cx.stroke();
    cx.lineWidth=7;
    cx.beginPath();cx.arc(0,-8,13,Math.PI*.25,Math.PI*1.75);cx.stroke();
    cx.beginPath();cx.arc(0,60,9,Math.PI*1.3,Math.PI*.7);cx.stroke();
    cx.restore();
  }
 
  function drawHammer(x,y,ang){
    cx.save();cx.translate(x,y);cx.rotate(ang);
    cx.fillStyle='#475569';cx.beginPath();cx.roundRect(-18,-14,36,13,3);cx.fill();
    cx.fillStyle='#94a3b8';cx.beginPath();cx.roundRect(-18,-14,14,13,3);cx.fill();
    cx.strokeStyle='#64748b';cx.lineWidth=7;cx.lineCap='round';
    cx.beginPath();cx.moveTo(0,0);cx.lineTo(0,48);cx.stroke();
    cx.restore();
  }
 
  /* ── Ground ── */
  function drawGround(){
    cx.fillStyle='rgba(255,255,255,.04)';
    cx.beginPath();cx.roundRect(30,GROUND,540,6,3);cx.fill();
    [[80,GROUND+6,10,30],[480,GROUND+6,10,30]].forEach(([x,y,w,h])=>{
      cx.fillStyle='rgba(255,255,255,.025)';cx.beginPath();cx.roundRect(x,y,w,h,2);cx.fill();
    });
  }
 
  /* ── Gear positions ── */
  const G1={x:160,y:210,R:78,r:26,teeth:16};
  const G2={x:300,y:188,R:54,r:18,teeth:11};
  const G3={x:406,y:228,R:36,r:13,teeth: 8};
  const cAB={x:(G1.x+G2.x)/2+2,y:(G1.y+G2.y)/2};
  const cBC={x:(G2.x+G3.x)/2,y:(G2.y+G3.y)/2};
 
  let arcTimer=0;
 
  function loop(){
    t+=.016;
    cx.clearRect(0,0,W,H);
 
    drawGround();
    drawSignal(300,42);
 
    /* connector rods */
    [G1,G2,G3].forEach(g=>{
      cx.strokeStyle='rgba(255,255,255,.05)';cx.lineWidth=4;cx.lineCap='round';
      cx.beginPath();cx.moveTo(g.x,g.y+g.R);cx.lineTo(g.x,GROUND);cx.stroke();
      /* energy bead */
      const bead=((t*60)%( GROUND-(g.y+g.R)));
      cx.beginPath();cx.arc(g.x,g.y+g.R+bead,3,0,Math.PI*2);
      cx.fillStyle='rgba(167,139,250,.5)';cx.fill();
    });
 
    gear(G1.x,G1.y,G1.R,G1.r,G1.teeth, t*.4*speed, '#1a0632','#7c3aed','#a78bfa',20);
    gear(G2.x,G2.y,G2.R,G2.r,G2.teeth,-t*.58*speed,'#0c1a2e','#38bdf8','#38bdf8',18);
    gear(G3.x,G3.y,G3.R,G3.r,G3.teeth, t*.88*speed,'#0d1f18','#34d399','#34d399',14);
 
    /* arcs */
    arcTimer++;
    if(arcTimer%6===0) drawArc(cAB.x,cAB.y,cBC.x,cBC.y,'rgba(167,139,250,.6)');
    if(arcTimer%9===0) drawArc(cAB.x,cAB.y,cAB.x+(Math.random()-0.5)*30,cAB.y-20,'rgba(56,189,248,.5)');
 
    /* sparks */
    if(Math.random()<.18*speed) spawnSpark(cAB.x,cAB.y);
    if(Math.random()<.10*speed) spawnSpark(cBC.x,cBC.y,'#34d399',3);
    updateSparks();
 
    /* tools */
    drawWrench(95,285,wrenchAngle());
    drawHammer(450,265,hammerAngle());
 
    /* screwdriver */
    cx.save();cx.translate(500,195);cx.rotate(Math.PI*.22+Math.sin(t*8)*.04);
    cx.strokeStyle='#64748b';cx.lineWidth=6;cx.lineCap='round';
    cx.beginPath();cx.moveTo(0,0);cx.lineTo(38,0);cx.stroke();
    cx.fillStyle='#475569';cx.beginPath();cx.roundRect(-6,-5,12,10,2);cx.fill();
    glow('#38bdf8',14);cx.strokeStyle='#38bdf8';cx.lineWidth=1.5;
    cx.beginPath();cx.moveTo(38,0);cx.lineTo(46,0);cx.stroke();noGlow();
    cx.restore();
 
    requestAnimationFrame(loop);
  }
  loop();
 
  /* ══════════════════════════════════════════
     TASK PROGRESSION SYSTEM
  ══════════════════════════════════════════ */
  const tasks=[
    {dot:'d0',label:'l0',fill:'f0',pct:'p0',target:100,cur:100,state:'done'},
    {dot:'d1',label:'l1',fill:'f1',pct:'p1',target:100,cur:0,state:'active'},
    {dot:'d2',label:'l2',fill:'f2',pct:'p2',target:100,cur:0,state:'wait'},
  ];
  let activeIdx=1;
  let stall=0,stallLen=0,lastTick=performance.now();
 
  function applyState(tk){
    const d=document.getElementById(tk.dot);
    const l=document.getElementById(tk.label);
    const f=document.getElementById(tk.fill);
    const p=document.getElementById(tk.pct);
    d.className='task-dot '+tk.state;
    l.className='task-label '+tk.state;
    f.className='task-fill '+tk.state;
    p.className='task-pct '+(tk.state==='done'?'done':tk.state==='active'?'active':'');
    f.style.width=tk.cur+'%';
    p.textContent=tk.state==='wait'?'—':Math.round(tk.cur)+'%';
  }
 
  /* seed bar 2 to 0 immediately */
  applyState(tasks[1]);
 
  setInterval(()=>{
    const now=performance.now();
    const tk=tasks[activeIdx];
    if(!tk||tk.state==='done') return;
 
    /* irregular speed: stall then burst */
    if(stall>0){stall--;return;}
    if(Math.random()<.12){stall=Math.floor(Math.random()*18)+6;stallLen=stall;return;}
 
    const maxStep = tk.cur>90 ? .12 : tk.cur>70 ? .4 : .8;
    tk.cur=Math.min(100,tk.cur+Math.random()*maxStep+.05);
 
    /* gear speed reacts to progress rate */
    speed=.7+tk.cur/100*.9+(stallLen?0:.3);
 
    applyState(tk);
 
    if(tk.cur>=100){
      tk.cur=100;tk.state='done';
      applyState(tk);
      speed=.5;
 
      /* calm then start next */
      setTimeout(()=>{
        activeIdx++;
        if(activeIdx<tasks.length){
          tasks[activeIdx].state='active';
          applyState(tasks[activeIdx]);
          speed=1;
        }
      },1200);
    }
  },60);
 
})();
</script>
</body>
</html>
