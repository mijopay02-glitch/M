<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vérification en cours — MIJO PAY</title>
  <style>
    body {
      background: #0A0C10;
      color: #F0F2F8;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .card { max-width: 360px; width: 100%; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: #2E7CF6;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-bar {
      width: 100%; height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px; margin: 20px 0 0; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%; background: #2E7CF6;
      border-radius: 2px; transition: width 0.4s ease;
    }
    h2 { font-size: 18px; margin: 0 0 8px; font-weight: 600; }
    p  { color: #8B92A5; font-size: 14px; margin: 0; line-height: 1.5; }
    .sub { color: #555c6e; font-size: 12px; margin-top: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h2>Confirmation du paiement…</h2>
    <p id="statusText">Vérification en cours.</p>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p class="sub" id="subText"></p>
  </div>

  <script>
    const reference  = new URLSearchParams(window.location.search).get("reference");
    const STATUS_URL = "https://moncash-connect-webhook.mijocomplexe.workers.dev/check-status";

    const statusTextEl = document.getElementById("statusText");
    const subTextEl    = document.getElementById("subText");
    const progressFill = document.getElementById("progressFill");

    // Très agressif au début — le webhook arrive souvent AVANT la redirection.
    // On ralentit seulement si MonCash a du retard.
    const DELAIS = [
      0,    // tentative 1 : immédiatement
      300,  // +300ms
      500,
      700,
      1000,
      1000,
      1500,
      1500,
      2000,
      2000, // ~10s total
      3000, 3000, 3000, 3000, 3000,  // ~25s
      5000, 5000, 5000, 5000, 5000,  // ~50s
      8000, 8000, 8000, 8000, 8000,  // ~90s
      10000, 10000, 10000, 10000     // ~130s puis timeout
    ];
    const TIMEOUT_MS = 150000;

    let tentative   = 0;
    let tempsEcoule = 0;
    let enCours     = false;

    function succes(newSolde) {
      progressFill.style.width      = "100%";
      progressFill.style.background = "#22c55e";
      statusTextEl.textContent      = "Paiement confirmé !";

      try {
        const userRaw = localStorage.getItem("user");
        if (userRaw && newSolde != null) {
          const userObj = JSON.parse(userRaw);
          userObj.Solde = newSolde;
          localStorage.setItem("user", JSON.stringify(userObj));
        }
      } catch (e) {}

      setTimeout(() => { window.location.href = "home.html?depot=succes"; }, 400);
    }

    function echec() {
      window.location.href = "depot.html?statut=echec";
    }

    async function verifier() {
      if (enCours) return;
      enCours = true;

      try {
        const res  = await fetch(`${STATUS_URL}?reference=${encodeURIComponent(reference)}`);
        const data = await res.json();

        if (data.status === "completed") { succes(data.newSolde); return; }
        if (data.status === "failed")    { echec(); return; }

      } catch (e) {
        console.warn("Erreur check-status :", e.message);
      }

      enCours = false;
      tentative++;

      const pct = Math.min((tempsEcoule / TIMEOUT_MS) * 100, 98);
      progressFill.style.width = pct + "%";

      if      (tempsEcoule < 4000)  statusTextEl.textContent = "Vérification en cours.";
      else if (tempsEcoule < 15000) statusTextEl.textContent = "En attente de MonCash…";
      else if (tempsEcoule < 45000) statusTextEl.textContent = "MonCash traite la transaction…";
      else                          statusTextEl.textContent = "Prise en compte du paiement…";

      if (tempsEcoule > 5000) {
        subTextEl.textContent = `${Math.round(tempsEcoule / 1000)}s — tentative ${tentative}`;
      }

      const idx           = Math.min(tentative, DELAIS.length - 1);
      const prochainDelai = DELAIS[idx];
      tempsEcoule        += prochainDelai;

      if (tempsEcoule >= TIMEOUT_MS) {
        progressFill.style.background = "#f59e0b";
        statusTextEl.textContent      = "Délai dépassé.";
        subTextEl.textContent         = "Vérifie ton solde dans quelques minutes.";
        return;
      }

      setTimeout(verifier, prochainDelai);
    }

    if (!reference) {
      statusTextEl.textContent = "Référence de paiement introuvable.";
    } else {
      verifier(); // première vérification IMMÉDIATEMENT
    }
  </script>
</body>
</html>
