<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vérification en cours — MIJO PAY</title>
  <style>
    body {
      background: #0A0C10;
      color: #F0F2F8;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #2E7CF6;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 18px; margin-bottom: 8px; }
    p { color: #8B92A5; font-size: 14px; }
  </style>
</head>
<body>
  <div>
    <div class="spinner"></div>
    <h2>Vérification de ton paiement...</h2>
    <p id="statusText">Cela prend quelques secondes.</p>
  </div>

<script>
  const params    = new URLSearchParams(window.location.search);
  const reference = params.get("reference");
  const STATUS_URL = "https://depot-moncash-connect.mijocomplexe.workers.dev/check-status";

  let tentatives = 0;
  const maxTentatives = 15; // 15 x 2s = 30 secondes max

  async function verifierStatut() {
    tentatives++;

    try {
      const res  = await fetch(`${STATUS_URL}?reference=${reference}`);
      const data = await res.json();

      if (data.status === "completed") {
        window.location.href = `home.html?depot=succes`;
        return;
      }

      if (data.status === "failed") {
        window.location.href = `depot.html?statut=echec`;
        return;
      }

    } catch (e) {}

    if (tentatives < maxTentatives) {
      setTimeout(verifierStatut, 2000);
    } else {
      document.getElementById("statusText").textContent =
        "Ça prend plus de temps que prévu. Vérifie ton solde dans quelques minutes.";
    }
  }

  verifierStatut();
</script>
</body>
</html>
