<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vérification en cours — MIJO PAY</title>
  <style>
    body {
      background: #0A0C10;
      color: #F0F2F8;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #2E7CF6;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 18px; margin-bottom: 8px; }
    p { color: #8B92A5; font-size: 14px; }
  </style>
</head>
<body>
  <div>
    <div class="spinner"></div>
    <h2>Vérification de ton paiement...</h2>
    <p id="statusText">Cela prend quelques secondes.</p>
  </div>

<script>
  const params    = new URLSearchParams(window.location.search);
  const reference = params.get("reference");
  const STATUS_URL = "https://moncash-connect-webhook.mijocomplexe.workers.dev/check-status";

  let tentatives = 0;
  const maxTentatives = 45; // Réduit car les intervalles sont plus longs maintenant

  async function verifierStatut() {
    tentatives++;

    try {
      const res  = await fetch(`${STATUS_URL}?reference=${reference}`);
      const data = await res.json();

      if (data.status === "completed") {
        const userRaw = localStorage.getItem("user");

        if (userRaw) {
            try {
                let userObj = JSON.parse(userRaw);
                userObj.Solde = data.newSolde;
                localStorage.setItem("user", JSON.stringify(userObj));
                console.log("Solde mis à jour :", data.newSolde);
            } catch (e) {
                console.error("Erreur localStorage :", e);
            }
        }
        window.location.href = "home.html?depot=succes";
        return;
      }

      if (data.status === "failed") {
        window.location.href = `depot.html?statut=echec`;
        return;
      }

    } catch (e) {
      console.error("Erreur lors de la vérification :", e);
    }

    // ══════════════════════════════════════════════════════════════════════
    // [OPTIMISATION] - Calcul de l'intervalle dynamique
    // ══════════════════════════════════════════════════════════════════════
    let prochainDelai = 3000; // 3 secondes par défaut

    if (tentatives > 10 && tentatives <= 22) {
      // Entre 30 secondes et 1m30 d'attente -> On passe à 5 secondes
      prochainDelai = 5000;
    } else if (tentatives > 22) {
      // Après 1m30 d'attente -> On passe à 10 secondes
      prochainDelai = 10000;
    }

    // Relancer la vérification avec le nouveau délai
    if (tentatives < maxTentatives) {
      setTimeout(verifierStatut, prochainDelai);
    } else {
      document.getElementById("statusText").textContent =
        "Le réseau est un peu lent. Vérifie ton solde MonCash, ton compte sera crédité d'ici peu.";
    }
  }

  // Lancement de la première vérification
  verifierStatut();
</script>
</body>
</html>
