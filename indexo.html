<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-K43FXR4W" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <div class="container" id="loginContainer">
        <img src="https://i.postimg.cc/yYCsdY18/remove.png" alt="MIJO PAY Logo">
        <h2>Connexion</h2>
        
        <div id="successCredentials" class="credentials-box">
            <h4>Inscription Réussie ! 🎉</h4>
            <p>Carte : <strong id="displayCard"></strong></p>
            <p>CIN : <strong id="displayCin"></strong></p>
            <p style="font-size: 12px;">Vos identifiants ont été pré-remplis ci-dessous.</p>
        </div>

        <input type="text" id="cardNumber" placeholder="Numéro de carte MIJO">
        <input type="password" id="cin" placeholder="Mot de passe (CIN)">
        <button id="loginButton" onclick="login()">Se connecter</button>
        <button class="link-btn" onclick="showInscription()">Créer un compte</button>
        <div id="message"></div>

        <a href="https://wa.me/50944990203?text=Bonjour,%20j'ai%20besoin%20d'aide%20avec%20mon%20compte%20MIJO%20PAY." class="whatsapp-btn" target="_blank">
            <i class="fa-brands fa-whatsapp" style="font-size: 1.2rem;"></i> Assistance WhatsApp
        </a>
    </div>

    <div class="container" id="inscriptionForm" style="display:none;">
        <h2>Créer un compte</h2>
        <input type="text" id="nomcomplet" placeholder="Nom complet">
        <input type="text" id="pays" placeholder="Pays">
        <input type="email" id="adresseemail" placeholder="Adresse email">
        <input type="tel" id="telephone" placeholder="Numéro WhatsApp">
        <button id="inscriptionButton" onclick="inscrire()">Valider et Générer ma carte</button>
        <button onclick="hideInscription()" style="background: #f44336;">Annuler</button>
        <div id="inscriptionMessage"></div>
    </div>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            const savedUser = JSON.parse(localStorage.getItem("user"));
            if (savedUser && savedUser.NumeroCarte) {
                document.getElementById("cardNumber").value = savedUser.NumeroCarte;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const cardNumberFromQr = urlParams.get('cardNumber'); 
            if (cardNumberFromQr) {
                document.getElementById("cardNumber").value = cardNumberFromQr.trim();
                document.getElementById("message").style.color = "blue";
                document.getElementById("message").innerText = "Carte scannée. Entrez votre CIN.";
                document.getElementById("cin").focus();
            }
        });

        const workerUrl = "https://newuser.mijocomplexe.workers.dev/";
        const loginBtn = document.getElementById('loginButton');
        const inscriptionBtn = document.getElementById('inscriptionButton');
        const messageDiv = document.getElementById('message');
        const inscriptionMessageDiv = document.getElementById('inscriptionMessage');

        // --- FONCTION DE CONNEXION MODIFIÉE ---
        async function login() {
            const cardNumber = document.getElementById("cardNumber").value.trim();
            const cin = document.getElementById("cin").value.trim();

            if (!cardNumber || !cin) {
                messageDiv.style.color = "red";
                messageDiv.innerText = "Veuillez remplir tous les champs.";
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerText = "Connexion en cours...";
            messageDiv.innerText = "";

            try {
                const response = await fetch("https://mijopay.mijocomplexe.workers.dev/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "login_user_by_card", cardNumber: cardNumber, password: cin })
                });

                const data = await response.json();

                if (data.success) {
                    // AJOUT : Vérification du statut de blocage
                    const echecs = parseInt(data.user.Nombre_Echecs) || 0;
                    
                    if (echecs >= 5) {
                        messageDiv.style.color = "#e74c3c";
                        messageDiv.innerHTML = `
                            <i class="fa-solid fa-lock"></i> Accès refusé.<br>
                            Votre compte est suspendu suite à trop de tentatives de recharge échouées.
                        `;
                        return; // On arrête l'exécution ici, pas de redirection !
                    }

                    // Si le compte n'est pas bloqué, on continue normalement
                    localStorage.setItem("user", JSON.stringify(data.user));
                    messageDiv.style.color = "green";
                    messageDiv.innerText = "Connexion réussie ! Redirection...";
                    setTimeout(() => { window.location.href = "home.html"; }, 1000);
                } else {
                    messageDiv.style.color = "red";
                    messageDiv.innerText = data.error || "Numéro de carte ou CIN incorrect.";
                }
            } catch (err) {
                messageDiv.style.color = "red";
                messageDiv.innerText = "Erreur de connexion avec le serveur.";
            } finally {
                if(messageDiv.innerHTML.indexOf('lock') === -1) { 
                    loginBtn.disabled = false;
                }
                loginBtn.innerText = "Se connecter";
            }
        }

        async function inscrire() {
            const nom = document.getElementById("nomcomplet").value.trim();
            const pays = document.getElementById("pays").value.trim();
            const email = document.getElementById("adresseemail").value.trim();
            const telephone = document.getElementById("telephone").value.trim();

            if (!nom || !pays || !email || !telephone) {
                inscriptionMessageDiv.style.color = "red";
                inscriptionMessageDiv.innerText = "Veuillez remplir tous les champs.";
                return;
            }

            inscriptionBtn.disabled = true;
            inscriptionBtn.innerText = "Création de votre carte en cours...";
            inscriptionMessageDiv.innerText = "";

            try {
                const response = await fetch(workerUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        action: "auto_register",
                        nom: nom,
                        pays: pays,
                        email: email,
                        telephone: telephone
                    })
                });

                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    const newUserCredentials = { NumeroCarte: data.card, CIN: data.cin };
                    localStorage.setItem("user", JSON.stringify(newUserCredentials));

                    document.getElementById("cardNumber").value = data.card;
                    document.getElementById("cin").value = data.cin;

                    document.getElementById("displayCard").innerText = data.card;
                    document.getElementById("displayCin").innerText = data.cin;
                    document.getElementById("successCredentials").style.display = "block";

                    document.getElementById("nomcomplet").value = "";
                    document.getElementById("pays").value = "";
                    document.getElementById("adresseemail").value = "";
                    document.getElementById("telephone").value = "";
                    
                    hideInscription();
                } else {
                    throw new Error(data.message || "Erreur lors de la création.");
                }

            } catch (err) {
                console.error("Erreur Inscription:", err);
                inscriptionMessageDiv.style.color = "red";
                inscriptionMessageDiv.innerText = "Une erreur est survenue : " + err.message;
            } finally {
                inscriptionBtn.disabled = false;
                inscriptionBtn.innerText = "Valider et Générer ma carte";
            }
        }

        function showInscription() {
            document.getElementById("loginContainer").style.display = "none";
            document.getElementById("inscriptionForm").style.display = "block";
            document.getElementById("successCredentials").style.display = "none";
        }

        function hideInscription() {
            document.getElementById("loginContainer").style.display = "block";
            document.getElementById("inscriptionForm").style.display = "none";
        }  
    </script>
</body>
