    <title>MIJO PAY - Accueil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue:       #1A6FE8;
            --blue-dark:  #1255C0;
            --blue-light: #EBF2FF;
            --gold:       #F59E0B;
            --gold-light: #FEF3C7;
            --green:      #10B981;
            --red:        #EF4444;
            --text:       #111827;
            --text-2:     #6B7280;
            --border:     #E5E7EB;
            --bg:         #F3F6FB;
            --white:      #FFFFFF;
            --radius-xl:  20px;
            --radius-lg:  14px;
            --radius-md:  10px;
            --shadow-sm:  0 1px 4px rgba(0,0,0,.08);
            --shadow-md:  0 4px 16px rgba(0,0,0,.10);
            --shadow-lg:  0 8px 32px rgba(26,111,232,.18);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text);
            padding-bottom: 80px;
        }

        /* ─── HEADER CARD ─────────────────────────── */
        .header-card {
            background: linear-gradient(145deg, #1A6FE8 0%, #1255C0 60%, #0D3E9A 100%);
            padding: 22px 20px 70px;
            position: relative;
            border-bottom-left-radius: 28px;
            border-bottom-right-radius: 28px;
            box-shadow: 0 8px 30px rgba(18,85,192,.35);
            overflow: hidden;
        }

        /* subtle decorative circles */
        .header-card::before,
        .header-card::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            opacity: .08;
            background: white;
        }
        .header-card::before {
            width: 220px; height: 220px;
            top: -80px; right: -60px;
        }
        .header-card::after {
            width: 140px; height: 140px;
            bottom: 20px; left: -40px;
        }

        /* top row */
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
            position: relative;
            z-index: 1;
        }

        .brand-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-avatar {
            width: 42px; height: 42px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,.3);
            object-fit: cover;
            background: rgba(255,255,255,.15);
        }

        .brand-info { display: flex; flex-direction: column; }
        .brand-greeting {
            font-size: .7em;
            color: rgba(255,255,255,.7);
            font-weight: 500;
            letter-spacing: .3px;
        }
        .brand-name {
            font-size: .98em;
            font-weight: 700;
            color: white;
            line-height: 1.2;
        }
        .brand-email {
            font-size: .68em;
            color: rgba(255,255,255,.6);
            font-weight: 400;
        }

        .logout-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px; height: 36px;
            border-radius: 10px;
            background: rgba(255,255,255,.12);
            border: 1px solid rgba(255,255,255,.18);
            cursor: pointer;
            text-decoration: none;
            transition: background .2s;
        }
        .logout-btn:active { background: rgba(255,255,255,.22); }
        .logout-btn img { width: 18px; filter: invert(1); }

        /* premium badge */
        .premium-badge {
            display: none;
            align-items: center;
            gap: 5px;
            background: rgba(245,158,11,.2);
            border: 1px solid rgba(245,158,11,.5);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: .65em;
            font-weight: 700;
            color: #FCD34D;
            letter-spacing: .5px;
        }
        .premium .premium-badge { display: flex; }

        /* balance zone */
        .balance-zone {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: var(--radius-xl);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 0;
        }

        .balance-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .balance-label {
            font-size: .65em;
            font-weight: 600;
            color: rgba(255,255,255,.65);
            text-transform: uppercase;
            letter-spacing: .8px;
            margin-bottom: 4px;
        }

        .balance-amount {
            font-size: 1.75em;
            font-weight: 800;
            color: white;
            line-height: 1;
            letter-spacing: -1px;
        }

        .balance-refresh {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 6px;
            width: 26px; height: 26px;
            border-radius: 8px;
            background: rgba(255,255,255,.15);
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: transform .3s;
        }
        .balance-refresh:active { transform: rotate(-360deg); }
        .balance-refresh img { width: 13px; filter: invert(1); }

        .balance-divider {
            width: 1px;
            height: 50px;
            background: rgba(255,255,255,.2);
            margin: 0 16px;
        }

        .usd-activate-btn {
            display: inline-block;
            margin-top: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,.18);
            border: 1px solid rgba(255,255,255,.3);
            color: white;
            font-size: .68em;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background .2s;
        }
        .usd-activate-btn.active-usd {
            background: rgba(16,185,129,.25);
            border-color: rgba(16,185,129,.5);
        }
        .usd-activate-btn:active { background: rgba(255,255,255,.28); }

        /* action buttons row */
        .actions-row {
            position: absolute;
            bottom: -32px;
            left: 0; right: 0;
            display: flex;
            justify-content: space-around;
            padding: 0 16px;
            z-index: 2;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7px;
            text-decoration: none;
            color: var(--text);
            cursor: pointer;
        }

        .action-btn {
            width: 58px; height: 58px;
            border-radius: 18px;
            background: var(--white);
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform .15s, box-shadow .15s;
            border: none;
            cursor: pointer;
        }
        .action-btn:active { transform: scale(.94); box-shadow: var(--shadow-sm); }
        .action-btn img { width: 26px; height: 26px; }

        .action-label {
            font-size: .68em;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
        }

        /* ─── MAIN CONTENT ────────────────────────── */
        .main-content {
            padding: 50px 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* section label */
        .section-label {
            font-size: .72em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .7px;
            color: var(--text-2);
            margin-bottom: 10px;
        }

        /* ─── DONORS TICKER ───────────────────────── */
        .donors-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            padding: 14px 16px;
        }

        .donors-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 11px;
        }

        .donors-left {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .live-dot {
            width: 8px; height: 8px;
            background: var(--green);
            border-radius: 50%;
            position: relative;
        }
        .live-dot::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: rgba(16,185,129,.3);
            animation: pulse 1.6s ease-out infinite;
        }
        @keyframes pulse {
            0%   { transform: scale(.8); opacity: 1; }
            100% { transform: scale(2);  opacity: 0; }
        }

        .donors-title {
            font-size: .75em;
            font-weight: 700;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: .4px;
        }

        .sponsor-cta {
            padding: 5px 13px;
            background: var(--blue);
            color: white;
            font-size: .67em;
            font-weight: 700;
            border-radius: 20px;
            text-decoration: none;
            transition: background .2s;
            box-shadow: 0 2px 8px rgba(26,111,232,.3);
        }
        .sponsor-cta:active { background: var(--blue-dark); }

        .ticker-wrap {
            position: relative;
            overflow: hidden;
        }
        .ticker-fade-l, .ticker-fade-r {
            position: absolute;
            top: 0; bottom: 0;
            width: 32px;
            z-index: 2;
            pointer-events: none;
        }
        .ticker-fade-l { left: 0; background: linear-gradient(to right, var(--white), transparent); }
        .ticker-fade-r { right: 0; background: linear-gradient(to left,  var(--white), transparent); }

        #scroll-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: max-content;
            animation: ticker 30s linear infinite;
            padding: 3px 0;
        }
        #scroll-container:hover { animation-play-state: paused; }

        @keyframes ticker {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .donor-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: var(--blue-light);
            border: 1px solid #C7D9F8;
            border-radius: 20px;
            font-size: .72em;
            font-weight: 600;
            color: var(--blue-dark);
            white-space: nowrap;
        }
        .donor-chip::before { content: '⭐'; font-size: .8em; }

        .donor-loading {
            background: #F9FAFB;
            border-color: var(--border);
            color: var(--text-2);
            font-style: italic;
        }
        .donor-loading::before { content: ''; }

        /* ─── FLYERS GRID ─────────────────────────── */
        .flyers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .flyer-card {
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            display: block;
            text-decoration: none;
            background: var(--white);
            transition: transform .2s, box-shadow .2s;
            border: 1px solid var(--border);
        }
        .flyer-card:active { transform: scale(.97); box-shadow: none; }
        .flyer-card img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            display: block;
        }
        .flyer-card.wide {
            grid-column: 1 / -1;
        }
        .flyer-card.wide img { height: 160px; }

        /* ─── MODAL ───────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.45);
            z-index: 100;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal-sheet {
            background: var(--white);
            border-radius: 24px 24px 0 0;
            padding: 24px 20px 36px;
            width: 100%;
            max-width: 480px;
            animation: slideUp .25s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .modal-handle {
            width: 40px; height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .modal-title {
            font-size: 1.05em;
            font-weight: 700;
            margin-bottom: 18px;
            color: var(--text);
        }

        .modal-close {
            float: right;
            font-size: 1.4em;
            color: var(--text-2);
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
        }

        .field-label {
            font-size: .72em;
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: .4px;
        }

        .field-input {
            width: 100%;
            padding: 13px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: .9em;
            color: var(--text);
            background: var(--bg);
            margin-bottom: 14px;
            outline: none;
            transition: border-color .2s;
        }
        .field-input:focus { border-color: var(--blue); }

        .confirm-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--blue), var(--blue-dark));
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: .9em;
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            transition: opacity .2s;
            margin-top: 2px;
        }
        .confirm-btn:active { opacity: .85; }

        .modal-message {
            font-size: .82em;
            text-align: center;
            margin-top: 12px;
            min-height: 20px;
            font-weight: 500;
        }

        /* ─── BOTTOM NAV ──────────────────────────── */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--white);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 14px;
            z-index: 50;
            box-shadow: 0 -4px 16px rgba(0,0,0,.07);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: var(--text-2);
            font-size: .62em;
            font-weight: 600;
            min-width: 60px;
        }
        .nav-icon { font-size: 1.5em; }
        .nav-item.active { color: var(--blue); }
        .nav-item.active .nav-icon-dot {
            display: block;
            width: 4px; height: 4px;
            background: var(--blue);
            border-radius: 50%;
            margin: 0 auto;
        }
        .nav-icon-dot { display: none; }

        /* ─── PREMIUM OVERRIDE ────────────────────── */
        .header-card.premium {
            background: linear-gradient(145deg, #D97706 0%, #B45309 60%, #92400E 100%);
            box-shadow: 0 8px 30px rgba(180,83,9,.35);
        }

    </style>
</head>

    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/03/12/19/20260312195118-4JAFKC3E.js" defer></script>

    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-K43FXR4W"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <!-- ═══ HEADER ═══════════════════════════════════ -->
    <div class="header-card" id="top-section">

        <div class="header-top">
            <div class="brand-row">
                <img src="https://i.postimg.cc/ryWXr8qx/20250410-102102.jpg" alt="MIJO PAY" class="brand-avatar">
                <div class="brand-info">
                    <span class="brand-greeting">Bonjour 👋</span>
                    <span class="brand-name" id="username">Chargement...</span>
                    <span class="brand-email" id="email"></span>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <div class="premium-badge" id="premium-badge">⭐ PREMIUM</div>
                <a href="#" class="logout-btn" onclick="logout()">
                    <img src="https://i.postimg.cc/43mBtP8B/icons8-exporter-48.png" alt="Déconnexion">
                </a>
            </div>
        </div>

        <!-- balances -->
        <div class="balance-zone">
            <div class="balance-col">
                <span class="balance-label">Solde HTG</span>
                <div style="display:flex;align-items:center;gap:6px;">
                    <span class="balance-amount" id="balance">—</span>
                    <a href="#" id="refresh-button" class="balance-refresh" onclick="refreshBalance(event)">
                        <img src="https://i.postimg.cc/KYTvhNzv/mise-a-jour.png" alt="↻">
                    </a>
                </div>
            </div>
            <div class="balance-divider"></div>
            <div class="balance-col">
                <span class="balance-label">Compte USD</span>
                <div id="usd-section" style="display:flex;flex-direction:column;align-items:center;">
                    <span class="balance-amount">…</span>
                </div>
            </div>
        </div>

        <!-- quick actions -->
        <div class="actions-row">
            <div class="action-item" onclick="window.location.href='depot.html'">
                <div class="action-btn">
                    <img src="https://i.postimg.cc/Gp8HvTvk/icons8-t-l-charger-24.png" alt="Dépôt">
                </div>
                <span class="action-label">Dépôt</span>
            </div>

            <div class="action-item" onclick="window.location.href='menuretrai.html'">
                <div class="action-btn">
                    <img src="https://i.postimg.cc/Gp8HvTvk/icons8-t-l-charger-24.png" alt="Retrait">
                </div>
                <span class="action-label">Retrait</span>
            </div>

            <div class="action-item" onclick="showTransferModal()">
                <div class="action-btn">
                    <img src="https://i.postimg.cc/jdtwB5rb/icons8-transfert-50.png" alt="Transfert">
                </div>
                <span class="action-label">Transfert</span>
            </div>

            <div class="action-item" onclick="checkAffiliateStatus()">
                <div class="action-btn">
                    <img src="https://i.postimg.cc/KjXqmTDQ/icons8-l-argent-avec-des-ailes-50.png" alt="Affiliate">
                </div>
                <span class="action-label">Affiliate</span>
            </div>
        </div>
    </div>

    <!-- ═══ MAIN CONTENT ═════════════════════════════ -->
    <div class="main-content">

        <!-- Donors ticker -->
        <div class="donors-card">
            <div class="donors-top">
                <div class="donors-left">
                    <div class="live-dot"></div>
                    <span class="donors-title">Nos Donateurs</span>
                </div>
                <a href="don.html" class="sponsor-cta">❤️ Devenir Sponsor</a>
            </div>
            <div class="ticker-wrap">
                <div class="ticker-fade-l"></div>
                <div class="ticker-fade-r"></div>
                <div id="scroll-container">
                    <span class="donor-chip donor-loading">Chargement des contributeurs...</span>
                </div>
            </div>
        </div>

        <!-- Flyers -->
        <div>
            <div class="section-label">À la une</div>
            <div class="flyers-grid">
                <a href="challenge.html" class="flyer-card wide">
                    <img src="https://i.postimg.cc/0N8mW562/a-realistic-business-flyer-design-with-b-w4vf-CSRr-R3u-GWd-RDF15Dg-31Hsgpj-MQq6f6ns-ENc-Hgfg-sd.jpg" alt="MIJO Business Challenge">
                </a>
                <a href="premium.html" class="flyer-card">
                    <img src="https://i.postimg.cc/d1zd7P3j/a-dynamic-promotional-poster-for-mijo-pa-O35h-A-9v-Sn-Srwi5-Blvd-PPA-l-NGj-Bdlx-TM6i-XCh8xxmma-A.jpg" alt="MIJO PAY Premium">
                </a>
                <a href="#" id="flyer-helper" class="flyer-card">
                    <img src="https://i.postimg.cc/P5M6b1Sp/a-clean-modern-digital-flyer-advertiseme-U-h-NVf-UQp2-Gce-Fap-Boa-Bw-kt-LI72-WMR1e3f16-TBRJCi-Q.jpg" alt="MIJO Business Helper">
                </a>
                <a href="carte.html" class="flyer-card">
                    <img src="https://i.postimg.cc/9MtzNzV8/a-sleek-product-shot-advertisement-showc-dn-RNraq-ARUKf5-Ux-FUEwg-Lw-6-Kqvf-UE-SKy-J-f-CNb-OJdnw.jpg" alt="Carte physique MIJO">
                </a>
                <a href="cine.html" class="flyer-card">
                    <img src="https://i.postimg.cc/yY7wGmrd/Gemini-Generated-Image-um8tpmum8tpmum8t.png" alt="MIJO CINE">
                </a>
                <a href="don.html" class="flyer-card">
                    <img src="https://i.postimg.cc/BbWhW5Sj/a-heartwarming-digital-flyer-advertiseme-spq1z-TDTRQu8-Sq7x-Ylr6-Q-wiy-Jeq-U-QQi-RWIPp-E5-VCyw.jpg" alt="Faire un don">
                </a>
            </div>
        </div>

    </div>

    <!-- ═══ TRANSFER MODAL (bottom sheet) ════════════ -->
    <div id="transferModal" class="modal-overlay">
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <button class="modal-close" onclick="hideTransferModal()">✕</button>
            <div class="modal-title">Effectuer un transfert</div>

            <div class="field-label">Montant (Gourdes)</div>
            <input type="number" id="transferAmount" class="field-input" placeholder="Ex: 500">

            <div class="field-label">Email du destinataire</div>
            <input type="email" id="recipientEmail" class="field-input" placeholder="nom@email.com">

            <button class="confirm-btn" onclick="handleTransfer()">Confirmer le transfert</button>
            <div id="transferMessage" class="modal-message"></div>
        </div>
    </div>

    <!-- ═══ BOTTOM NAV ════════════════════════════════ -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span>Accueil</span>
            <span class="nav-icon-dot"></span>
        </a>
        <a href="store.html" class="nav-item">
            <span class="nav-icon">🛒</span>
            <span>Store</span>
            <span class="nav-icon-dot"></span>
        </a>
    </nav>

    <!-- ═══ SCRIPTS ═══════════════════════════════════ -->
    <script>

    /* ── DONORS ──────────────────────────────────────── */
    async function chargerSponsors() {
        try {
            const res = await fetch("https://dons.mijocomplexe.workers.dev/donateurs");
            const data = await res.json();
            const container = document.getElementById('scroll-container');
            if (data.success && data.donateurs.length > 0) {
                const html = data.donateurs.map(d =>
                    `<span class="donor-chip">${d.nom}</span>`
                ).join('');
                container.innerHTML = html + html;
            } else {
                container.innerHTML = `<span class="donor-chip donor-loading">Rejoignez l'aventure Mijo Pay !</span>`;
            }
        } catch (e) {}
    }
    chargerSponsors();

    /* ── CONSTANTES ──────────────────────────────────── */
    const loginUrl    = "https://mijopay.mijocomplexe.workers.dev/";
    const transferUrl = "https://transfert.mijocomplexe.workers.dev/";
    const GLOBAL_HISTORY_WORKER_URL = "https://transaction.mijocomplexe.workers.dev/";
    const storeScriptUrl = "https://mijopaypremium.mijocomplexe.workers.dev/";

    /* ── SESSION ─────────────────────────────────────── */
    window.addEventListener('DOMContentLoaded', checkUserSession);
    window.addEventListener('pageshow', checkUserSession);

    function checkUserSession() {
        const storedUser = localStorage.getItem('user');
        if (!storedUser) return window.location.href = 'index.html';
        try {
            const user = JSON.parse(storedUser);
            if (user && (user.userId || user.id)) updateUI(user);
            else throw new Error();
        } catch (e) { logout(); }
    }

    /* ── UPDATE UI ───────────────────────────────────── */
    function updateUI(user) {
        const header = document.getElementById('top-section');
        const premBadge = document.getElementById('premium-badge');

        const name  = user.NomUtilisateur || user["Nom Utilisateur"] || user.nom || "Utilisateur";
        const email = user.Email || user.email || "";
        document.getElementById('username').innerText = name;
        document.getElementById('email').innerText = email;

        // HTG balance
        let solde = parseFloat(user.Solde) || 0;
        document.getElementById('balance').innerText =
            (solde % 1 === 0 ? solde : solde.toFixed(2)) + " G";

        // USD section
        const usdSection = document.getElementById('usd-section');
        if (user.Compte_US_Actif === true || user.Compte_US_Actif === "true") {
            const usd = (parseFloat(user.Solde_USD) || 0).toFixed(2);
            usdSection.innerHTML = `
                <span class="balance-amount">${usd} $</span>
                <a href="change.html" class="usd-activate-btn active-usd">🔄 Change</a>
            `;
        } else {
            usdSection.innerHTML = `
                <span class="balance-amount" style="opacity:.5;font-size:1.4em;">🔒</span>
                <a href="#" class="usd-activate-btn" onclick="initiateUSDActivation(event)">Activer</a>
            `;
        }

        // Premium
        if (user.EstPremium) {
            header.classList.add('premium');
            premBadge.style.display = 'flex';
        } else {
            header.classList.remove('premium');
            premBadge.style.display = 'none';
        }
    }

    /* ── USD ACTIVATION ──────────────────────────────── */
    async function initiateUSDActivation(event) {
        event.preventDefault();
        const userString = localStorage.getItem('user');
        if (!userString || userString === "undefined") { alert("Session expirée."); return logout(); }
        const user = JSON.parse(userString);

        if (!confirm("Activer le compte Stable USD pour 200 Gdes ?")) return;

        const btn = event.target;
        btn.innerText = "..."; btn.style.pointerEvents = "none";

        try {
            const res = await fetch("https://steep-cell-904c.mijocomplexe.workers.dev/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ senderId: user.userId, amount: 200 })
            });
            const data = await res.json();
            if (data.success) {
                alert("Félicitations ! Votre compte USD est désormais actif.");
                localStorage.setItem("user", JSON.stringify(data.user));
                updateUI(data.user);
            } else {
                alert("Erreur : " + (data.error || "Impossible d'activer le compte."));
            }
        } catch (e) {
            alert("Erreur de connexion au serveur.");
        } finally {
            btn.innerText = "Activer"; btn.style.pointerEvents = "auto";
        }
    }

    /* ── LOGOUT ──────────────────────────────────────── */
    function logout() {
        localStorage.removeItem('user');
        window.location.href = 'index.html';
    }

    /* ── REFRESH BALANCE ─────────────────────────────── */
    async function refreshBalance(event) {
        if (event) event.preventDefault();
        const btn = document.getElementById('refresh-button');
        const userString = localStorage.getItem('user');
        if (!userString) return logout();
        const user = JSON.parse(userString);

        btn.style.opacity = '.4'; btn.style.pointerEvents = 'none';
        try {
            const res = await fetch(loginUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action:"login_user_by_card", cardNumber:user.NumeroCarte, password:user.CIN })
            });
            const data = await res.json();
            if (data.success && data.user) {
                data.user.userId = user.userId;
                localStorage.setItem("user", JSON.stringify(data.user));
                updateUI(data.user);
            } else updateUI(user);
        } catch (e) { updateUI(user); }
        finally { btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; }
    }

    /* ── TRANSFER MODAL ──────────────────────────────── */
    function showTransferModal() {
        document.getElementById('transferModal').classList.add('open');
    }
    function hideTransferModal() {
        document.getElementById('transferModal').classList.remove('open');
        document.getElementById('transferMessage').innerText = "";
    }

    async function handleTransfer() {
        const amount = parseFloat(document.getElementById('transferAmount').value);
        const recipientEmail = document.getElementById('recipientEmail').value;
        const msg = document.getElementById('transferMessage');

        if (!amount || amount <= 0 || !recipientEmail) {
            msg.style.color = '#EF4444';
            msg.innerText = "Veuillez vérifier le montant et l'email.";
            return;
        }

        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) return logout();

        msg.style.color = '#1A6FE8'; msg.innerText = "Traitement en cours…";

        try {
            const res = await fetch(transferUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action:"automatic_transfer", senderId:user.userId, recipientEmail, amount })
            });
            const data = await res.json();
            if (data.success) {
                user.Solde = Math.round(parseFloat(data.newBalance) * 100) / 100;
                localStorage.setItem('user', JSON.stringify(user));
                updateUI(user);
                saveToHistory('Transfert', amount, 'Envoyé', recipientEmail, user.userId);
                msg.style.color = '#10B981'; msg.innerText = "✅ Transfert réussi !";
                document.getElementById('transferAmount').value = "";
                document.getElementById('recipientEmail').value = "";
                setTimeout(hideTransferModal, 2000);
            } else {
                msg.style.color = '#EF4444'; msg.innerText = data.error || "Échec du transfert.";
            }
        } catch (e) {
            msg.style.color = '#EF4444'; msg.innerText = "Erreur de connexion serveur.";
        }
    }

    /* ── AFFILIATE ───────────────────────────────────── */
    function checkAffiliateStatus() {
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) return logout();
        window.location.href = user.Estafilia ? 'mijo-affiliate-promo.html' : 'mijo-affiliate-inscription.html';
    }

    /* ── HISTORY ─────────────────────────────────────── */
    function saveToHistory(type, amount, status, recipient, userId) {
        const key = `transactions_${userId}`;
        const history = JSON.parse(localStorage.getItem(key)) || [];
        history.push({ id: Date.now(), type, amount, status, recipient, date: new Date().toLocaleDateString() });
        localStorage.setItem(key, JSON.stringify(history));
    }

    /* ── FLYER HELPER ────────────────────────────────── */
    document.getElementById('flyer-helper')?.addEventListener('click', function(e) {
        e.preventDefault();
        const userString = localStorage.getItem('user');
        if (!userString) { alert("Veuillez vous connecter."); return window.location.href = 'index.html'; }
        const user = JSON.parse(userString);
        user.EstPremium ? window.location.href = "helper.html" : alert("Réservé aux membres Premium.");
    });

    /* Close modal on overlay tap */
    document.getElementById('transferModal').addEventListener('click', function(e) {
        if (e.target === this) hideTransferModal();
    });

    </script>
</body>
</html>
