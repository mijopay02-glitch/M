<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIJO PAY — Mes Transactions</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0A0C10;
      --bg2:       #0F1117;
      --bg3:       #151820;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.12);
      --blue:      #2E7CF6;
      --blue2:     #1A5FD4;
      --gold:      #F5C842;
      --green:     #10B981;
      --red:       #EF4444;
      --purple:    #8B5CF6;
      --orange:    #F97316;
      --text:      #F0F2F8;
      --text2:     #8B92A5;
      --text3:     #5A6278;
      --radius:    16px;
      --radius2:   12px;
    }
 
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
 
    /* ── Background mesh ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(46,124,246,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(139,92,246,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
 
    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,12,16,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
    }
 
    .header-inner {
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 14px;
      height: 60px;
    }
 
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
      text-decoration: none;
      flex-shrink: 0;
    }
    .back-btn:hover { background: var(--border2); }
 
    .header-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 18px;
      flex: 1;
    }
 
    .header-badge {
      background: rgba(46,124,246,0.15);
      border: 1px solid rgba(46,124,246,0.3);
      color: var(--blue);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
    }
 
    /* ── Content ── */
    .content {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 100px;
    }
 
    /* ── Summary card ── */
    .summary-card {
      background: linear-gradient(135deg, #1A2540 0%, #0F1525 100%);
      border: 1px solid rgba(46,124,246,0.2);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
 
    .summary-item { text-align: center; }
    .summary-item:first-child {
      border-right: 1px solid var(--border);
      grid-column: 1;
    }
    .summary-label {
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }
    .summary-value {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
    }
    .summary-value.green { color: var(--green); }
    .summary-value.red   { color: var(--red); }
 
    /* ── Filter tabs ── */
    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 20px;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
 
    .filter-btn {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text2);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .filter-btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }
    .filter-btn:hover:not(.active) {
      border-color: var(--border2);
      color: var(--text);
    }
 
    /* ── Section title ── */
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text3);
      margin: 24px 0 10px;
    }
    .section-title:first-of-type { margin-top: 0; }
 
    /* ── Transaction card ── */
    .tx-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius2);
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all .2s;
      animation: slideUp .3s ease forwards;
      opacity: 0;
    }
    .tx-card:hover {
      background: var(--bg3);
      border-color: var(--border2);
      transform: translateY(-1px);
    }
 
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    /* ── Icon bubble ── */
    .tx-icon {
      width: 44px; height: 44px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .tx-icon.type-store     { background: rgba(46,124,246,0.15); }
    .tx-icon.type-affil     { background: rgba(245,200,66,0.15); }
    .tx-icon.type-usd-buy   { background: rgba(16,185,129,0.15); }
    .tx-icon.type-usd-sell  { background: rgba(16,185,129,0.15); }
    .tx-icon.type-usd-activ { background: rgba(139,92,246,0.15); }
    .tx-icon.type-transfer  { background: rgba(249,115,22,0.15); }
    .tx-icon.type-don       { background: rgba(236,72,153,0.15); }
    .tx-icon.type-premium   { background: rgba(245,200,66,0.15); }
    .tx-icon.type-bonus     { background: rgba(16,185,129,0.15); }
    .tx-icon.type-depot     { background: rgba(46,124,246,0.15); }
 
    /* ── Content ── */
    .tx-body { flex: 1; min-width: 0; }
 
    .tx-label {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
 
    .tx-sub {
      font-size: 12px;
      color: var(--text2);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
 
    .tx-right { text-align: right; flex-shrink: 0; }
 
    .tx-amount {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
    }
    .tx-amount.credit { color: var(--green); }
    .tx-amount.debit  { color: var(--red); }
 
    .tx-date {
      font-size: 11px;
      color: var(--text3);
      margin-top: 3px;
    }
 
    /* ── Status dot ── */
    .tx-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .status-dot.ok  { background: var(--green); }
    .status-dot.fail { background: var(--red); }
    .status-dot.pending { background: var(--gold); }
 
    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: .5;
    }
    .empty-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text2);
    }
    .empty-sub { font-size: 14px; color: var(--text3); }
 
    /* ── Loading ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 60px 20px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text2); }
 
    /* ── Detail modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
 
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 20px 40px;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32,.72,0,1);
    }
    .modal-overlay.open .modal {
      transform: translateY(0);
    }
 
    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border2);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
 
    .modal-icon {
      width: 64px; height: 64px;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      margin: 0 auto 16px;
    }
 
    .modal-amount {
      text-align: center;
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .modal-type {
      text-align: center;
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 24px;
    }
 
    .modal-rows { display: flex; flex-direction: column; gap: 12px; }
 
    .modal-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg3);
      border-radius: var(--radius2);
    }
    .modal-row-label { font-size: 13px; color: var(--text2); }
    .modal-row-value { font-size: 13px; font-weight: 600; color: var(--text); text-align: right; max-width: 60%; }
 
    .modal-close {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius2);
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .modal-close:hover { background: var(--border); }
 
    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--bg3) 25%, var(--bg2) 50%, var(--bg3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius2);
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .sk-card {
      height: 72px;
      margin-bottom: 8px;
    }
 
    /* ── Error banner ── */
    .error-banner {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius2);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #FCA5A5;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
 
<!-- ── Header ── -->
<div class="header">
  <div class="header-inner">
    <a href="home.html" class="back-btn">&#8592;</a>
    <div class="header-title">Mes Transactions</div>
    <div class="header-badge" id="txCount">0</div>
  </div>
</div>
 
<!-- ── Content ── -->
<div class="content">
 
  <!-- Summary -->
  <div class="summary-card" id="summaryCard" style="display:none">
    <div class="summary-item">
      <div class="summary-label">Total crédité</div>
      <div class="summary-value green" id="totalCredit">0 G</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Total débité</div>
      <div class="summary-value red" id="totalDebit">0 G</div>
    </div>
  </div>
 
  <!-- Filters -->
  <div class="filters" id="filtersBar" style="display:none">
    <button class="filter-btn active" data-filter="all">Tout</button>
    <button class="filter-btn" data-filter="Achat Store">🛒 Store</button>
    <button class="filter-btn" data-filter="Transfert">📤 Transferts</button>
    <button class="filter-btn" data-filter="Affiliation">🤝 Affiliation</button>
    <button class="filter-btn" data-filter="Dépôt">🏧 Dépôt</button>
    <button class="filter-btn" data-filter="Bonus">🎉 Bonus</button>
    <button class="filter-btn" data-filter="Don">🎁 Dons</button>
    <button class="filter-btn" data-filter="Abonnement Premium">⭐ Premium</button>
    <button class="filter-btn" data-filter="Achat USD">💵 USD</button>
    <!-- AVANT -->

  </div>
 
  <!-- Error -->
  <div class="error-banner" id="errorBanner" style="display:none">
    <span>⚠️</span>
    <span id="errorMsg">Une erreur est survenue.</span>
  </div>
 
  <!-- List -->
  <div id="txList"></div>
 
</div>
 
<!-- ── Detail modal ── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-icon" id="mIcon"></div>
    <div class="modal-amount" id="mAmount"></div>
    <div class="modal-type" id="mType"></div>
    <div class="modal-rows" id="mRows"></div>
    <button class="modal-close" onclick="closeModalDirect()">Fermer</button>
  </div>
</div>
 
<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const WORKER_URL = "https://transactions.mijocomplexe.workers.dev/";
 
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let allTx    = [];
let filtered = [];
let userId   = null;
let activeFilter = "all";
 
// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
document.addEventListener("DOMContentLoaded", () => {
  const user = getUser();
  if (!user || !user.userId) {
    window.location.href = "index.html";
    return;
  }
  userId = user.userId;
  loadTransactions();
  initFilters();
});
 
function getUser() {
  try { return JSON.parse(localStorage.getItem("user")); }
  catch { return null; }
}
 
// ══════════════════════════════════════════
// LOAD TRANSACTIONS
// ══════════════════════════════════════════
async function loadTransactions() {
  showSkeletons();
 
  try {
    const res  = await fetch(WORKER_URL, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ action: "get_transactions", userId })
    });
 
    const data = await res.json();
 
    if (!data.success) {
      showError(data.error || "Impossible de charger les transactions.");
      document.getElementById("txList").innerHTML = "";
      return;
    }
 
    allTx    = data.transactions || [];
    filtered = [...allTx];
 
    renderSummary();
    renderList();
 
    document.getElementById("filtersBar").style.display = "flex";
    document.getElementById("summaryCard").style.display = "grid";
 
  } catch (err) {
    showError("Erreur de connexion. Vérifiez votre réseau.");
    document.getElementById("txList").innerHTML = "";
  }
}
 
// ══════════════════════════════════════════
// SUMMARY
// ══════════════════════════════════════════
function renderSummary() {
  let credit = 0, debit = 0;
  allTx.forEach(tx => {
    if (tx.estCredit) credit += tx.montant;
    else              debit  += tx.montant;
  });
  document.getElementById("totalCredit").textContent = credit.toLocaleString("fr") + " G";
  document.getElementById("totalDebit").textContent  = debit.toLocaleString("fr")  + " G";
  document.getElementById("txCount").textContent     = allTx.length;
}
 
// ══════════════════════════════════════════
// RENDER LIST
// ══════════════════════════════════════════
function renderList() {
  const list = document.getElementById("txList");
 
  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">Aucune transaction</div>
        <div class="empty-sub">Aucun résultat pour ce filtre.</div>
      </div>`;
    return;
  }
 
  // Grouper par date
  const groups = {};
  filtered.forEach(tx => {
    const d   = new Date(tx.date);
    const key = isToday(d) ? "Aujourd'hui"
              : isYesterday(d) ? "Hier"
              : d.toLocaleDateString("fr-FR", { day: "2-digit", month: "long", year: "numeric" });
    if (!groups[key]) groups[key] = [];
    groups[key].push(tx);
  });
 
  let html = "";
  Object.entries(groups).forEach(([date, txs], gi) => {
    html += `<div class="section-title">${date}</div>`;
    txs.forEach((tx, ti) => {
      const delay  = (gi * 50 + ti * 40) + "ms";
      const cfg    = getTxConfig(tx);
      const sign   = tx.estCredit ? "+" : "−";
      const cls    = tx.estCredit ? "credit" : "debit";
      const sub    = buildSub(tx);
 
      html += `
        <div class="tx-card" style="animation-delay:${delay}"
             onclick="openModal(${JSON.stringify(JSON.stringify(tx)).slice(1,-1)})">
          <div class="tx-icon ${cfg.iconClass}">${cfg.emoji}</div>
          <div class="tx-body">
            <div class="tx-label">${cfg.label}</div>
            <div class="tx-sub">${sub}</div>
          </div>
          <div class="tx-right">
            <div class="tx-amount ${cls}">${sign}${tx.montant.toLocaleString("fr")} G</div>
            <div class="tx-date">${formatTime(tx.date)}</div>
          </div>
        </div>`;
    });
  });
 
  list.innerHTML = html;
}
 
// ══════════════════════════════════════════
// TX CONFIG (emoji + label + iconClass)
// ══════════════════════════════════════════
function getTxConfig(tx) {
  const type = tx.type || tx.typeTransaction || "";
  const map  = {
    "Achat Store":           { emoji: "🛒", label: tx.label || ("Achat • " + (tx.nomProduit || "Store")),         iconClass: "type-store"    },
    "ACHAT_STORE":           { emoji: "🛒", label: tx.label || ("Achat • " + (tx.nomProduit || "Store")),         iconClass: "type-store"    },
    "Affiliation":           { emoji: "🤝", label: "Inscription Affilié",                                         iconClass: "type-affil"    },
    "Achat USD":             { emoji: "💵", label: "Achat de dollars",                                            iconClass: "type-usd-buy"  },
    "Vente USD":             { emoji: "💴", label: "Vente de dollars",                                            iconClass: "type-usd-sell" },
    "Activation Compte USD": { emoji: "🌐", label: "Activation Compte USD",                                       iconClass: "type-usd-activ"},
    "Transfert":             { emoji: tx.estCredit ? "📥" : "📤",
                               label: tx.estCredit ? "Transfert reçu" : "Transfert envoyé",                       iconClass: "type-transfer" },
    "Don":                   { emoji: "🎁", label: "Don à MIJO PAY",                                              iconClass: "type-don"      },
    "Abonnement Premium":    { emoji: "⭐", label: "Premium activé",                                              iconClass: "type-premium"  },
    "Bonus":                 { emoji: "🎉", label: "Bonus reçu",                                                   iconClass: "type-bonus"    },
    "Dépôt Agent":           { emoji: "🏧", label: "Dépôt via Agent",                                             iconClass: "type-depot"    },
  };
  return map[type] || { emoji: "💳", label: type || "Transaction", iconClass: "type-store" };
}
 
// ══════════════════════════════════════════
// SUB-LINE
// ══════════════════════════════════════════
function buildSub(tx) {
  const type = tx.type || "";
 
  if (type === "Affiliation") {
    return tx.nomParrain
      ? `Parrain : <strong style="color:#F5C842">${tx.nomParrain}</strong>`
      : tx.codeParrain ? `Parrain : ${tx.codeParrain}` : "Affiliation directe";
  }
  if (type === "Abonnement Premium") {
    const match = (tx.infoSecondaire || "").match(/Expire le : (.+)/);
    return match ? `Expire le ${match[1]}` : "1 mois d'accès Premium";
  }
  if (type === "Achat USD") {
    const match = (tx.infoSecondaire || "").match(/([\d.]+) USD/);
    return match ? `${match[1]} USD crédités sur votre compte` : tx.infoSecondaire;
  }
  if (type === "Vente USD") {
    return tx.infoSecondaire || "Conversion USD → HTG";
  }
  if (type === "Transfert" && tx.estCredit) {
    return "Reçu d'un membre MIJO PAY";
  }
  if (type === "Transfert" && !tx.estCredit) {
    const m = (tx.infoSecondaire || "").match(/Vers : (.+)/);
    return m ? `Envoyé à ${m[1]}` : (tx.infoSecondaire || "");
  }
  if (type === "Dépôt Agent") {
    const m = (tx.infoSecondaire || "").match(/Via agent : (.+)/);
    return m ? `Agent : ${m[1]}` : (tx.infoSecondaire || "");
  }
 
  return tx.infoSecondaire || "";
}
 
// ══════════════════════════════════════════
// FILTERS
// ══════════════════════════════════════════
function initFilters() {
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeFilter = btn.dataset.filter;
 
      filtered = activeFilter === "all"
        ? [...allTx]
        : allTx.filter(tx =>
            (tx.type || "").includes(activeFilter) ||
            (tx.typeTransaction || "").includes(activeFilter)
          );
 
      renderList();
    });
  });
}
 
// ══════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════
function openModal(txJson) {
  let tx;
  try { tx = JSON.parse(txJson); } catch { return; }
 
  const cfg  = getTxConfig(tx);
  const sign = tx.estCredit ? "+" : "−";
  const cls  = tx.estCredit ? "var(--green)" : "var(--red)";
 
  // Icon
  const icon = document.getElementById("mIcon");
  icon.textContent  = cfg.emoji;
  icon.className    = `modal-icon ${cfg.iconClass}`;
  icon.style.fontSize = "30px";
 
  // Amount
  document.getElementById("mAmount").textContent   = sign + tx.montant.toLocaleString("fr") + " G";
  document.getElementById("mAmount").style.color   = cls;
  document.getElementById("mType").textContent     = cfg.label;
 
  // Rows
  const statusColor = tx.statut === "Complété" || tx.statut === "Payé" || tx.statut === "Réussi"
    ? "var(--green)" : "var(--gold)";
 
  const rows = [
    ["Date",           new Date(tx.date).toLocaleString("fr-FR")],
    ["Statut",         `<span style="color:${statusColor}">${tx.statut || "—"}</span>`],
    ["Solde avant",    (tx.soldeAvant || 0).toLocaleString("fr") + " G"],
    ["Solde après",    (tx.soldeApres || 0).toLocaleString("fr") + " G"],
  ];
 
  if (tx.type === "Affiliation" && tx.nomParrain) {
    rows.push(["Parrain", tx.nomParrain]);
  }
  if (tx.type === "Achat Store" && tx.nomProduit) {
    rows.push(["Produit", tx.nomProduit]);
  }
  if (tx.typePaiement) {
    rows.push(["Mode de paiement", tx.typePaiement]);
  }
  if (tx.devise) {
    rows.push(["Devise", tx.devise]);
  }
  if (tx.infoSecondaire && tx.infoSecondaire.length > 2) {
    rows.push(["Détail", tx.infoSecondaire]);
  }
 
  document.getElementById("mRows").innerHTML = rows.map(([l, v]) => `
    <div class="modal-row">
      <span class="modal-row-label">${l}</span>
      <span class="modal-row-value">${v}</span>
    </div>`).join("");
 
  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}
 
function closeModal(e) {
  if (e.target === document.getElementById("modalOverlay")) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow = "";
}
 
// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function showSkeletons() {
  let html = "";
  for (let i = 0; i < 6; i++) {
    html += `<div class="skeleton sk-card" style="animation-delay:${i * 80}ms"></div>`;
  }
  document.getElementById("txList").innerHTML = html;
}
 
function showError(msg) {
  const el = document.getElementById("errorBanner");
  document.getElementById("errorMsg").textContent = msg;
  el.style.display = "flex";
  setTimeout(() => el.style.display = "none", 6000);
}
 
function formatTime(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
}
 
function isToday(d) {
  const t = new Date();
  return d.getDate()===t.getDate() && d.getMonth()===t.getMonth() && d.getFullYear()===t.getFullYear();
}
 
function isYesterday(d) {
  const t = new Date(); t.setDate(t.getDate()-1);
  return d.getDate()===t.getDate() && d.getMonth()===t.getMonth() && d.getFullYear()===t.getFullYear();
}
